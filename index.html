<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAWASAN — J.Nazreen</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
#canvas { display:block; width:100vw; height:100vh; }

#no-webgl {
  display:none; position:fixed; inset:0; background:#000;
  color:#888; font-size:1rem; align-items:center; justify-content:center;
  flex-direction:column; gap:1rem; text-align:center; padding:2rem;
}

/* LOADING */
#loading {
  position:fixed; inset:0; background:#000;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:1.2rem; z-index:200;
  transition:opacity 1.2s ease;
}
#loading-label {
  color:#444; font-size:0.55rem; letter-spacing:0.6em; text-transform:uppercase;
}
#loading h1 {
  color:#d4c9a8; font-size:clamp(2.5rem,10vw,6rem);
  letter-spacing:0.5em; font-weight:100; font-family:'Courier New',monospace;
  text-shadow:0 0 40px rgba(212,201,168,0.15);
}
#loading-sub-title {
  color:#555; font-size:0.6rem; letter-spacing:0.4em;
}
#loading-bar-wrap { width:180px; height:1px; background:#1a1a1a; }
#loading-bar { height:1px; background:#d4c9a8; width:0%; transition:width 0.4s ease; }
#loading-msg { color:#333; font-size:0.58rem; letter-spacing:0.2em; min-height:1em; }

/* HUD */
#hud {
  position:fixed; top:0; left:0; right:0; bottom:0;
  pointer-events:none; z-index:10;
}
#brand {
  position:absolute; top:1.2rem; left:50%;
  transform:translateX(-50%);
  color:rgba(212,201,168,0.4); font-size:0.6rem; letter-spacing:0.6em;
}
#byline {
  position:absolute; top:2.2rem; left:50%;
  transform:translateX(-50%);
  color:rgba(212,201,168,0.18); font-size:0.45rem; letter-spacing:0.4em;
}
#time-display {
  position:absolute; bottom:1.4rem; left:1.4rem;
  color:rgba(212,201,168,0.3); font-size:0.58rem; letter-spacing:0.2em;
}
#coords {
  position:absolute; bottom:1.4rem; right:1.4rem;
  color:rgba(212,201,168,0.2); font-size:0.5rem; letter-spacing:0.1em; text-align:right;
}
#torch-indicator {
  position:absolute; top:1.2rem; right:1.4rem;
  color:rgba(255,220,100,0.5); font-size:0.5rem; letter-spacing:0.2em;
  opacity:0; transition:opacity 0.5s;
}
#torch-indicator.on { opacity:1; }

/* CROSSHAIR */
#crosshair {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:12px; height:12px; pointer-events:none;
}
#crosshair::before, #crosshair::after {
  content:''; position:absolute; background:rgba(212,201,168,0.25);
}
#crosshair::before { width:1px; height:12px; left:50%; top:0; }
#crosshair::after  { width:12px; height:1px; top:50%; left:0; }

/* DPAD — shifted left */
#dpad {
  position:fixed; bottom:2.5rem; left:18%;
  transform:translateX(-50%);
  display:grid;
  grid-template-columns:repeat(3,52px);
  grid-template-rows:repeat(3,52px);
  gap:5px; z-index:20; pointer-events:all;
}
#dpad button {
  background:rgba(212,201,168,0.07);
  border:1px solid rgba(212,201,168,0.12);
  color:rgba(212,201,168,0.55); font-size:1.1rem;
  border-radius:6px; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  user-select:none; touch-action:manipulation;
  transition:background 0.08s, border-color 0.08s;
}
#dpad button:active, #dpad button.pressed {
  background:rgba(212,201,168,0.18);
  border-color:rgba(212,201,168,0.35);
}
#dpad .empty { visibility:hidden; }
#dpad #btn-sprint {
  font-size:0.48rem; letter-spacing:0.08em;
  color:rgba(212,201,168,0.35);
  background:rgba(212,201,168,0.04);
}

/* HORROR OVERLAY */
#horror-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0);
  pointer-events:none; z-index:50;
  transition:background 0.25s ease;
}
#horror-overlay.flash   { background:rgba(255,255,255,0.04); }
#horror-overlay.red     { background:rgba(100,0,0,0.2); }
#horror-overlay.white   { background:rgba(255,255,255,0.12); }

/* SUBTITLE */
#subtitle {
  position:fixed; bottom:22%; left:50%;
  transform:translateX(-50%);
  color:rgba(0,0,0,0); font-size:0.72rem;
  letter-spacing:0.35em; pointer-events:none; z-index:55;
  transition:color 0.6s ease; text-align:center; white-space:nowrap;
  text-shadow:0 0 20px rgba(200,170,120,0.5);
}
#subtitle.visible { color:rgba(200,175,130,0.9); }

/* STATIC FRAME */
#static-frame {
  position:fixed; inset:0; display:none;
  align-items:center; justify-content:center;
  z-index:60; background:#000;
}
#static-frame.active { display:flex; }
#static-canvas { width:100vw; height:100vh; image-rendering:pixelated; }
#static-msg {
  position:absolute; bottom:14%;
  color:rgba(200,185,155,0.75); font-size:0.65rem;
  letter-spacing:0.45em; font-family:'Courier New',monospace;
  text-transform:uppercase;
}

/* VIGNETTE */
#vignette {
  position:fixed; inset:0;
  background:radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.75) 100%);
  pointer-events:none; z-index:5;
}

/* CONTROLS HINT */
#hint {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  color:rgba(212,201,168,0.45); font-size:0.62rem;
  letter-spacing:0.25em; text-align:center;
  z-index:15; pointer-events:none;
  transition:opacity 2s ease;
}
#hint p { margin-bottom:0.5rem; }

/* NENEK WARNING */
#nenek-warn {
  position:fixed; top:35%; left:50%;
  transform:translateX(-50%);
  color:rgba(0,0,0,0); font-size:0.55rem;
  letter-spacing:0.5em; pointer-events:none; z-index:56;
  transition:color 1s ease; text-align:center;
}
#nenek-warn.visible { color:rgba(180,100,100,0.6); }
</style>
</head>
<body>

<div id="no-webgl">
  <div style="letter-spacing:0.4em">KAWASAN</div>
  <div style="color:#444;font-size:0.8rem;margin-top:0.5rem">WEBGL TIDAK DISOKONG<br>CUBA PELAYAR LAIN</div>
</div>

<div id="loading">
  <div id="loading-label">F12 PRESENTS</div>
  <h1>KAWASAN</h1>
  <div id="loading-sub-title">by J.Nazreen</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-msg">memuatkan dunia...</div>
</div>

<div id="hud">
  <div id="brand">KAWASAN — J.NAZREEN</div>
  <div id="byline">F12 PRODUCTIONS</div>
  <div id="time-display">03:17 AM</div>
  <div id="coords">3.1390° N, 101.6869° E</div>
  <div id="torch-indicator">⚡ TORCH</div>
  <div id="crosshair"></div>
</div>

<div id="vignette"></div>
<div id="horror-overlay"></div>
<div id="subtitle"></div>
<div id="nenek-warn">DIA DENGAR AWAK</div>

<div id="static-frame">
  <canvas id="static-canvas" width="640" height="360"></canvas>
  <div id="static-msg"></div>
</div>

<div id="dpad">
  <div class="empty"></div>
  <button id="btn-up"     data-dir="forward">▲</button>
  <button id="btn-sprint" data-dir="sprint">RUN</button>
  <button id="btn-left"   data-dir="left">◀</button>
  <button id="btn-down"   data-dir="back">▼</button>
  <button id="btn-right"  data-dir="right">▶</button>
  <div class="empty"></div>
  <div class="empty"></div>
  <div class="empty"></div>
</div>

<div id="hint">
  <p>WASD / ANAK PANAH</p>
  <p style="color:rgba(212,201,168,0.25)">SHIFT — lari &nbsp;|&nbsp; KLIK — pusing pandangan</p>
</div>

<canvas id="canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){

// ─── WEBGL CHECK ──────────────────────────────────────────────
const canvas = document.getElementById('canvas');
try {
  const t = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!t) throw 0;
} catch(e) {
  document.getElementById('no-webgl').style.display = 'flex';
  document.getElementById('loading').style.display = 'none';
  return;
}

// ─── RENDERER ────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;   // brighter overall

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d14);
scene.fog = new THREE.FogExp2(0x0d0d14, 0.012); // lighter fog = more visible

const camera = new THREE.PerspectiveCamera(72, window.innerWidth/window.innerHeight, 0.1, 400);
camera.position.set(0, 1.7, 0);

const clock = new THREE.Clock();

// ─── LOADING UI ───────────────────────────────────────────────
const loadBar = document.getElementById('loading-bar');
const loadMsg  = document.getElementById('loading-msg');
function setLoad(pct, msg){ loadBar.style.width=pct+'%'; if(msg) loadMsg.textContent=msg; }

// ─── MATERIALS ────────────────────────────────────────────────
const M = {
  road:      new THREE.MeshLambertMaterial({ color:0x1a1a1e }),
  sidewalk:  new THREE.MeshLambertMaterial({ color:0x222228 }),
  wall_a:    new THREE.MeshLambertMaterial({ color:0x1e1c20 }),
  wall_b:    new THREE.MeshLambertMaterial({ color:0x181620 }),
  wall_c:    new THREE.MeshLambertMaterial({ color:0x201a18 }),
  shopfront: new THREE.MeshLambertMaterial({ color:0x111116 }),
  ceiling:   new THREE.MeshLambertMaterial({ color:0x0e0e12 }),
  pole:      new THREE.MeshLambertMaterial({ color:0x282830 }),
  alley:     new THREE.MeshLambertMaterial({ color:0x141418 }),
  alley_b:   new THREE.MeshLambertMaterial({ color:0x100e14 }),
  ground_a:  new THREE.MeshLambertMaterial({ color:0x151518 }),
  concrete:  new THREE.MeshLambertMaterial({ color:0x1c1c22 }),
  rust:      new THREE.MeshLambertMaterial({ color:0x2a1a10 }),
  neon_r:    new THREE.MeshStandardMaterial({ color:0xff3333, emissive:0xff1111, emissiveIntensity:2.0 }),
  neon_g:    new THREE.MeshStandardMaterial({ color:0x00ff88, emissive:0x00ee66, emissiveIntensity:1.8 }),
  neon_b:    new THREE.MeshStandardMaterial({ color:0x44aaff, emissive:0x2288ff, emissiveIntensity:1.8 }),
  neon_y:    new THREE.MeshStandardMaterial({ color:0xffcc00, emissive:0xffaa00, emissiveIntensity:1.6 }),
  neon_pk:   new THREE.MeshStandardMaterial({ color:0xff44aa, emissive:0xff22aa, emissiveIntensity:2.0 }),
  lamp:      new THREE.MeshStandardMaterial({ color:0xffe8b0, emissive:0xffcc80, emissiveIntensity:1.5 }),
  glass:     new THREE.MeshStandardMaterial({ color:0x334466, transparent:true, opacity:0.25, roughness:0.05 }),
  skin:      new THREE.MeshLambertMaterial({ color:0xb07850 }),
  shirt:     new THREE.MeshLambertMaterial({ color:0x1a2838 }),
  pants:     new THREE.MeshLambertMaterial({ color:0x22201e }),
  hair:      new THREE.MeshLambertMaterial({ color:0x080604 }),
  shoes:     new THREE.MeshLambertMaterial({ color:0x111111 }),
  n_skin:    new THREE.MeshLambertMaterial({ color:0x5a4535 }),
  n_baju:    new THREE.MeshLambertMaterial({ color:0x100808 }),
  n_hair:    new THREE.MeshLambertMaterial({ color:0xc8c8b0 }),
  torch:     new THREE.MeshStandardMaterial({ color:0xffeecc, emissive:0xffdd99, emissiveIntensity:3.0 }),
  distant:   new THREE.MeshLambertMaterial({ color:0x0e0e14 }),
  wire:      new THREE.LineBasicMaterial({ color:0x1e1e22 }),
  drain:     new THREE.MeshLambertMaterial({ color:0x111114 }),
};

const world = new THREE.Group();
scene.add(world);

// ─── HELPERS ──────────────────────────────────────────────────
function box(w,h,d,mat,x,y,z,ry){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  m.position.set(x,y,z);
  if(ry) m.rotation.y = ry;
  m.receiveShadow = true; m.castShadow = true;
  world.add(m); return m;
}
function cyl(r,h,mat,x,y,z,segs){
  const m = new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,segs||8), mat);
  m.position.set(x,y,z); m.castShadow=true; world.add(m); return m;
}

// ─── SCENE LIGHTS ─────────────────────────────────────────────
// Brighter ambient — city glow, not pitch black
scene.add(new THREE.AmbientLight(0x2a2a40, 1.4));
// Moon — cool blue-white directional
const moon = new THREE.DirectionalLight(0x8899cc, 0.6);
moon.position.set(40,80,-60);
moon.castShadow = true;
scene.add(moon);
// Orange city-haze fill from above (like KL smog glow)
const cityGlow = new THREE.HemisphereLight(0x3a2a10, 0x050508, 0.5);
scene.add(cityGlow);

// ─── GROUND ───────────────────────────────────────────────────
setLoad(8,'membina laluan...');
box(300,0.1,300, M.road, 0,-0.05,0);

// Painted road lines
for(let i=-5;i<=5;i++){
  box(0.12,0.02,2.5, new THREE.MeshLambertMaterial({color:0x555560}), 0,-0.02,i*6);
}

// ─── DRAINAGE LONGKANG (open drain both sides of road) ────────
for(let z=-120;z<80;z+=8){
  box(0.8,0.35,7.8, M.drain, -5.5,-0.17,z+4);
  box(0.8,0.35,7.8, M.drain,  5.5,-0.17,z+4);
}

const STREET_W = 10;
const BLOCK = 42;
const BLOCKS = 7;

// Sidewalks
for(let i=0;i<BLOCKS;i++){
  const z = (i-BLOCKS*0.5)*BLOCK + BLOCK*0.5;
  box(2.2,0.15,BLOCK, M.sidewalk, -(STREET_W*0.5+1.1), 0.075, z);
  box(2.2,0.15,BLOCK, M.sidewalk,  (STREET_W*0.5+1.1), 0.075, z);
}

// ─── SHOPHOUSES — proper KL 5-foot-way prewar ─────────────────
setLoad(18,'membina kedai...');
function shophouse(cx, cz, side, wallMat, accentMat){
  const s = side; // -1 left, 1 right
  const ox = s*(STREET_W*0.5 + 2.2 + 6.5);

  // Ground floor body
  box(13,4.2,BLOCK*0.48, wallMat, ox, 2.1, cz);
  // Upper floor
  box(13,3.8,BLOCK*0.48, accentMat||wallMat, ox, 6.0, cz);
  // Roofline parapet
  box(13.4,0.5,BLOCK*0.48+0.4, M.concrete, ox, 8.05, cz);
  // 5-foot-way ceiling slab
  box(3.5,0.2,BLOCK*0.48, M.ceiling, ox-s*5.25, 3.4, cz);
  // 5-foot-way columns
  const numCols = Math.floor(BLOCK*0.48/4);
  for(let c=0;c<numCols;c++){
    const colz = cz - BLOCK*0.24 + c*4 + 2;
    cyl(0.14,3.4, M.pole, ox-s*5.25, 1.7, colz, 6);
  }
  // Shopfront recesses (ground floor)
  box(4,2.6,0.3, M.shopfront, ox, 1.3, cz - s*BLOCK*0.24 - 0.02);
  // Upper windows
  for(let w=0;w<3;w++){
    const wz = cz + (w-1)*4;
    box(2.2,1.6,0.12, M.glass, ox, 5.8, wz - s*BLOCK*0.24 - 0.06);
    // Window frame
    box(2.4,0.1,0.13, M.concrete, ox, 5.0, wz - s*BLOCK*0.24 - 0.06);
    box(2.4,0.1,0.13, M.concrete, ox, 6.6, wz - s*BLOCK*0.24 - 0.06);
  }
  // AC units on upper floor (detail)
  box(0.9,0.6,0.7, M.concrete, ox + (Math.random()-0.5)*3, 5.2, cz + 2);
  // Old signboard slot
  box(5,0.8,0.12, wallMat, ox, 3.6, cz - s*BLOCK*0.24);
}

const wallMats = [M.wall_a, M.wall_b, M.wall_c];
for(let i=0;i<BLOCKS;i++){
  const cz = (i-BLOCKS*0.5)*BLOCK + BLOCK*0.5;
  const mL = wallMats[i%3];
  const mR = wallMats[(i+1)%3];
  const aL = wallMats[(i+2)%3];
  const aR = wallMats[i%3];
  shophouse(0, cz, -1, mL, aL);
  shophouse(0, cz,  1, mR, aR);
}

// ─── BACK ALLEY SYSTEM ────────────────────────────────────────
setLoad(28,'membina lorong gelap...');
// KL-style: narrow 3m alleys behind shophouses, walls close in
function backAlley(side, startZ, length){
  const ox = side*(STREET_W*0.5 + 2.2 + 14);
  // Alley floor — cracked, stained
  box(3.5, 0.1, length, M.alley_b, ox, -0.02, startZ);
  // Back wall of shophouses (other side)
  box(0.4, 9, length+2, M.alley, ox - side*1.75, 4.5, startZ);
  // Opposite alley wall (back of next block)
  box(0.4, 7, length+2, M.alley_b, ox + side*1.75, 3.5, startZ);

  // Clutter: bins, crates, pipes
  const numItems = Math.floor(length/10);
  for(let n=0;n<numItems;n++){
    const iz = startZ - length*0.5 + n*(length/numItems) + Math.random()*4;
    const iy = 0.2 + Math.random()*0.3;
    // Trash bin
    box(0.5,0.8,0.5, M.rust, ox + (Math.random()-0.5)*1.5, iy, iz);
    // Pipe along wall
    cyl(0.06, 2.5, M.pole, ox - side*1.5, 2.5, iz, 5);
  }
  // Puddle (dark plane, slightly reflective)
  const pudMat = new THREE.MeshStandardMaterial({color:0x0a0a10,roughness:0.05,metalness:0.9,transparent:true,opacity:0.7});
  const pud = new THREE.Mesh(new THREE.PlaneGeometry(1.8,1.2), pudMat);
  pud.rotation.x = -Math.PI/2;
  pud.position.set(ox, 0.01, startZ + (Math.random()-0.5)*length*0.5);
  world.add(pud);
}

backAlley(-1, -60, BLOCKS*BLOCK*0.85);
backAlley( 1, -40, BLOCKS*BLOCK*0.85);

// ─── CROSS ALLEYS (perpendicular — connects main st to back) ──
for(let i=1;i<BLOCKS;i++){
  const z = (i - BLOCKS*0.5)*BLOCK;
  // Alley floor
  box(32, 0.1, 5.5, M.alley, 0, -0.03, z);
  // Side walls
  box(0.3, 6, 32, M.alley_b, -20, 3, z);
  box(0.3, 6, 32, M.alley_b,  20, 3, z);
  // Ceiling gap with wires
  box(32, 0.2, 0.3, M.ceiling, 0, 5.8, z);
}

// ─── OVERHEAD WIRES ───────────────────────────────────────────
setLoad(35,'memasang wayar...');
for(let i=0;i<28;i++){
  const pts=[];
  const sz=(Math.random()-0.5)*BLOCKS*BLOCK;
  const sag=0.3+Math.random()*0.5;
  for(let t=0;t<=1;t+=0.08){
    pts.push(new THREE.Vector3(-18+36*t, 6.2-sag*4*t*(1-t), sz+(Math.random()-0.5)*1.5));
  }
  world.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), M.wire));
}

// ─── LAMP POSTS ───────────────────────────────────────────────
setLoad(42,'menyalakan lampu...');
const lampLights = [];

for(let i=-BLOCKS*0.5;i<=BLOCKS*0.5;i++){
  const z = i*BLOCK*0.5;
  [-1,1].forEach(s=>{
    const lx = s*(STREET_W*0.5+0.6);
    cyl(0.07,6.5,M.pole, lx, 3.25, z, 6);
    box(1.5,0.07,0.07, M.pole, lx+s*0.6, 6.5, z);
    const lampHead = box(0.35,0.22,0.35, M.lamp, lx+s*1.3, 6.45, z);
    const pl = new THREE.PointLight(0xffd080, 1.6, 22, 2);
    pl.position.set(lx+s*1.3, 6.2, z);
    scene.add(pl);
    lampLights.push({light:pl, mesh:lampHead, base:1.6, phase:Math.random()*Math.PI*2});
  });
}

// ─── NEON SIGNS — KL Mamak/Kedai era ─────────────────────────
setLoad(50,'menghidupkan papan neon...');
const neons = [
  {mat:M.neon_r,  x:-22, y:4.8, z:-80, w:3.2, h:0.7},
  {mat:M.neon_g,  x: 23, y:5.2, z:-40, w:2.8, h:0.6},
  {mat:M.neon_b,  x:-24, y:4.2, z: 10, w:3.5, h:0.65},
  {mat:M.neon_y,  x: 22, y:4.6, z: 50, w:2.5, h:0.6},
  {mat:M.neon_pk, x:-22, y:5.0, z: 80, w:3.0, h:0.6},
  {mat:M.neon_r,  x: 24, y:4.4, z:-60, w:2.2, h:0.55},
  {mat:M.neon_g,  x:-23, y:4.7, z: 40, w:2.6, h:0.6},
  {mat:M.neon_pk, x: 22, y:5.1, z:-10, w:3.2, h:0.7},
];
neons.forEach((n,idx)=>{
  const sign = box(n.w, n.h, 0.1, n.mat, n.x, n.y, n.z);
  const gl = new THREE.PointLight(n.mat.emissive, 0.7, 12, 2);
  gl.position.set(n.x, n.y, n.z);
  scene.add(gl);
  lampLights.push({light:gl, mesh:sign, base:0.7, phase:idx*0.7+1.3, neon:true});
});

// ─── DISTANT KL SKYLINE ───────────────────────────────────────

// ─── PLAYER MOVEMENT ──────────────────────────────────────────
const playerPos=new THREE.Vector3(0,1.7,0);
const WALK=4.2, RUN=9.0;

function updatePlayer(dt){
  const speed = keys.sprint ? RUN : WALK;
  const fwd = new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const rgt = new THREE.Vector3( Math.cos(yaw),0,-Math.sin(yaw));
  const move= new THREE.Vector3();

  if(keys.forward) move.add(fwd);
  if(keys.back)    move.sub(fwd);
  if(keys.right)   move.add(rgt);
  if(keys.left)    move.sub(rgt);

  if(move.length()>0){
    move.normalize().multiplyScalar(speed*dt);
    const np = playerPos.clone().add(move);
    // simple wall stop
    np.x = Math.max(-22, Math.min(22, np.x));
    np.z = Math.max(-145, Math.min(65, np.z));
    // Block solid walls (shophouse bodies)
    if(Math.abs(np.x)>6.2 && Math.abs(np.x)<15.5){
      // in the 5-foot-way — allowed
    }
    if(Math.abs(np.x)>16.2) np.x = Math.sign(np.x)*16.2;
    playerPos.copy(np);
  }
  playerPos.y=1.7;

  camera.position.copy(playerPos);
  camera.rotation.order='YXZ';
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;

  // Avatar behind camera
  const behind=new THREE.Vector3(Math.sin(yaw)*1.2,0,Math.cos(yaw)*1.2);
  const avPos=playerPos.clone().add(behind);
  avPos.y=0;
  avatarGroup.position.copy(avPos);
  avatarGroup.rotation.y=yaw+Math.PI;

  // Hide avatar if looking straight down
  avatarGroup.visible = pitch < 0.3;

  // Torch position — just ahead of camera
  const tFwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  torchLight.position.copy(playerPos).addScaledVector(tFwd,0.4);
  torchLight.position.y=playerPos.y-0.15;
  torchLight.target.position.copy(playerPos).addScaledVector(tFwd,8);
  torchLight.target.position.y=playerPos.y-0.3;
  torchLight.target.updateMatrixWorld();

  // Walk animation
  const moving=keys.forward||keys.back||keys.left||keys.right;
  if(moving){
    const t2=clock.getElapsedTime()*(keys.sprint?6.5:3.8);
    legL.position.y=0.12+Math.sin(t2)*0.09;
    legR.position.y=0.12-Math.sin(t2)*0.09;
    armL.position.y=1.03-Math.sin(t2)*0.06;
    armR.position.y=1.03+Math.sin(t2)*0.06;
    avatarGroup.position.y+=Math.sin(t2*2)*0.018;
  }
}

// ─── AUDIO SYSTEM ─────────────────────────────────────────────
let audioCtx=null, masterGain=null, audioStarted=false;
let radioNode=null, footstepTimer=0, nenekSoundTimer=0;
let nenekProximitySound=false;
let torchOn=false;

function initAudio(){
  if(audioStarted) return;
  audioStarted=true;
  torchOn=true;
  document.getElementById('torch-indicator').classList.add('on');
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain();
    masterGain.gain.value=0.3;
    masterGain.connect(audioCtx.destination);

    // ── LOW DRONE ──
    function drone(freq,gain,detune){
      const o=audioCtx.createOscillator();
      const g=audioCtx.createGain();
      const f=audioCtx.createBiquadFilter();
      o.type='sawtooth'; o.frequency.value=freq;
      if(detune) o.detune.value=detune;
      f.type='lowpass'; f.frequency.value=180+Math.random()*80;
      g.gain.value=gain;
      const lfo=audioCtx.createOscillator();
      const lg=audioCtx.createGain();
      lfo.frequency.value=0.04+Math.random()*0.07; lg.gain.value=9;
      lfo.connect(lg); lg.connect(o.detune);
      o.connect(f); f.connect(g); g.connect(masterGain);
      o.start(); lfo.start();
    }
    drone(55,0.10,0); drone(55.4,0.05,6); drone(27.5,0.07,-4);

    // ── WIND ──
    function wind(){
      const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*3,audioCtx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
      const src=audioCtx.createBufferSource();
      src.buffer=buf; src.loop=true;
      const f=audioCtx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=350; f.Q.value=0.4;
      const g=audioCtx.createGain(); g.gain.value=0.025;
      src.connect(f); f.connect(g); g.connect(masterGain);
      src.start();
    }
    wind();

    // ── DISTANT TRAFFIC HUM ──
    function trafficHum(){
      const o=audioCtx.createOscillator();
      const g=audioCtx.createGain();
      const f=audioCtx.createBiquadFilter();
      o.type='sine'; o.frequency.value=68;
      f.type='lowpass'; f.frequency.value=120;
      g.gain.value=0.04;
      o.connect(f); f.connect(g); g.connect(masterGain);
      o.start();
    }
    trafficHum();

    // ── RADIO — classic Malay P.Ramlee-era song (synthesized) ──
    // Generates a simple pentatonic melody that loops, through heavy AM filtering
    function buildRadio(){
      const radioGain=audioCtx.createGain(); radioGain.gain.value=0.0;
      const amFilter=audioCtx.createBiquadFilter(); amFilter.type='bandpass'; amFilter.frequency.value=1200; amFilter.Q.value=0.8;
      const distortion=audioCtx.createWaveShaper();
      const curve=new Float32Array(256);
      for(let i=0;i<256;i++){ const x=i*2/256-1; curve[i]=x*(1.2+Math.abs(x)); }
      distortion.curve=curve;

      // Static noise for radio
      const staticBuf=audioCtx.createBuffer(1,audioCtx.sampleRate*2,audioCtx.sampleRate);
      const sd=staticBuf.getChannelData(0);
      for(let i=0;i<sd.length;i++) sd[i]=(Math.random()*2-1)*0.15;
      const staticSrc=audioCtx.createBufferSource();
      staticSrc.buffer=staticBuf; staticSrc.loop=true;
      const sGain=audioCtx.createGain(); sGain.gain.value=0.3;
      staticSrc.connect(sGain); sGain.connect(radioGain);

      // Melody oscillator (old Malay pentatonic)
      const notes=[220,246,261,293,330,293,261,246]; // A3 pentatonic
      let ni=0;
      const melody=audioCtx.createOscillator();
      melody.type='triangle';
      melody.frequency.value=notes[0];
      const mGain=audioCtx.createGain(); mGain.gain.value=0.12;
      melody.connect(amFilter); amFilter.connect(distortion); distortion.connect(mGain); mGain.connect(radioGain);
      melody.start(); staticSrc.start();

      // Sequence the notes
      let noteTime=audioCtx.currentTime;
      function scheduleNotes(){
        for(let n=0;n<16;n++){
          melody.frequency.setValueAtTime(notes[ni%notes.length], noteTime);
          mGain.gain.setValueAtTime(Math.random()>0.15?0.12:0, noteTime);
          ni++;
          noteTime+=0.35;
        }
        setTimeout(scheduleNotes, 5000);
      }
      scheduleNotes();

      radioGain.connect(masterGain);
      radioNode=radioGain;
    }
    buildRadio();

    // ── CREAKS / GROANS ──
    function scheduleCreak(){
      const delay=6+Math.random()*18;
      setTimeout(()=>{
        if(!audioCtx) return;
        const o=audioCtx.createOscillator();
        const g=audioCtx.createGain();
        o.type='sine';
        o.frequency.setValueAtTime(160+Math.random()*60,audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(55,audioCtx.currentTime+0.4);
        g.gain.setValueAtTime(0.07,audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);
        o.connect(g); g.connect(masterGain);
        o.start(); o.stop(audioCtx.currentTime+0.55);
        scheduleCreak();
      }, delay*1000);
    }
    scheduleCreak();

  }catch(e){ console.warn('Audio fail:',e); }
}

// Footstep sound
function playFootstep(){
  if(!audioCtx||!masterGain) return;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  const f=audioCtx.createBiquadFilter();
  o.type='sine';
  o.frequency.setValueAtTime(90+Math.random()*30,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(30,audioCtx.currentTime+0.12);
  f.type='lowpass'; f.frequency.value=300;
  g.gain.setValueAtTime(0.09,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.15);
  o.connect(f); f.connect(g); g.connect(masterGain);
  o.start(); o.stop(audioCtx.currentTime+0.18);
}

// Nenek laugh/cackle
function playNenekLaugh(){
  if(!audioCtx) return;
  const times=[0,0.18,0.36,0.55,0.75];
  times.forEach(t=>{
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.type='sawtooth';
    o.frequency.setValueAtTime(280+Math.random()*80,audioCtx.currentTime+t);
    o.frequency.exponentialRampToValueAtTime(180,audioCtx.currentTime+t+0.14);
    g.gain.setValueAtTime(0,audioCtx.currentTime+t);
    g.gain.linearRampToValueAtTime(0.10,audioCtx.currentTime+t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+t+0.16);
    const f=audioCtx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=800; f.Q.value=1.5;
    o.connect(f); f.connect(g); g.connect(masterGain);
    o.start(audioCtx.currentTime+t);
    o.stop(audioCtx.currentTime+t+0.2);
  });
}

// ─── STATIC FRAME DRAWINGS ────────────────────────────────────
function drawStatic(type){
  const W=staticCanvas.width, H2=staticCanvas.height;
  sCtx.fillStyle='#000'; sCtx.fillRect(0,0,W,H2);

  if(type==='alley'){
    // Sky
    const sky=sCtx.createLinearGradient(0,0,0,H2*0.55);
    sky.addColorStop(0,'#070710'); sky.addColorStop(1,'#0f0f18');
    sCtx.fillStyle=sky; sCtx.fillRect(0,0,W,H2*0.55);
    // Alley walls (more detailed — concrete texture via rects)
    sCtx.fillStyle='#0c0c10';
    sCtx.fillRect(0,H2*0.05,W*0.22,H2);
    sCtx.fillRect(W*0.78,H2*0.05,W*0.22,H2);
    // Wall texture lines
    sCtx.strokeStyle='#0e0e14'; sCtx.lineWidth=1;
    for(let y=H2*0.1;y<H2;y+=12){ sCtx.beginPath(); sCtx.moveTo(0,y); sCtx.lineTo(W*0.22,y); sCtx.stroke(); }
    for(let y=H2*0.1;y<H2;y+=12){ sCtx.beginPath(); sCtx.moveTo(W*0.78,y); sCtx.lineTo(W,y); sCtx.stroke(); }
    // Ground
    sCtx.fillStyle='#090910'; sCtx.fillRect(W*0.22,H2*0.52,W*0.56,H2);
    // Perspective edges
    sCtx.strokeStyle='#181820'; sCtx.lineWidth=1;
    sCtx.beginPath();
    sCtx.moveTo(W*0.22,H2*0.52); sCtx.lineTo(W*0.44,H2*0.32);
    sCtx.moveTo(W*0.78,H2*0.52); sCtx.lineTo(W*0.56,H2*0.32);
    sCtx.stroke();
    // Neon glow at vanishing point
    const ng=sCtx.createRadialGradient(W*0.5,H2*0.28,1,W*0.5,H2*0.28,55);
    ng.addColorStop(0,'rgba(0,200,100,0.15)'); ng.addColorStop(1,'transparent');
    sCtx.fillStyle=ng; sCtx.fillRect(0,0,W,H2);
    // Dark figure at end
    sCtx.fillStyle='#000';
    sCtx.beginPath(); sCtx.arc(W*0.5,H2*0.29,5,0,Math.PI*2); sCtx.fill();
    sCtx.fillRect(W*0.497,H2*0.3,6,20);
    // Overhead wires
    sCtx.strokeStyle='#1a1a22'; sCtx.lineWidth=1;
    for(let w=0;w<3;w++){
      sCtx.beginPath();
      sCtx.moveTo(W*0.22,H2*(0.25+w*0.04));
      sCtx.quadraticCurveTo(W*0.5,H2*(0.3+w*0.04+0.04),W*0.78,H2*(0.25+w*0.04));
      sCtx.stroke();
    }
    // Longkang drain edge
    sCtx.strokeStyle='#111118'; sCtx.lineWidth=2;
    sCtx.beginPath(); sCtx.moveTo(W*0.28,H2*0.52); sCtx.lineTo(W*0.32,H2); sCtx.stroke();
    sCtx.beginPath(); sCtx.moveTo(W*0.72,H2*0.52); sCtx.lineTo(W*0.68,H2); sCtx.stroke();

  } else if(type==='nenek'){
    sCtx.fillStyle='#000'; sCtx.fillRect(0,0,W,H2);
    // Dark street
    sCtx.fillStyle='#0c0c12'; sCtx.fillRect(0,H2*0.42,W,H2);
    sCtx.fillStyle='#060608'; sCtx.fillRect(0,0,W*0.18,H2); sCtx.fillRect(W*0.82,0,W*0.18,H2);
    // Nenek silhouette — hunched
    sCtx.fillStyle='#000';
    sCtx.beginPath(); sCtx.ellipse(W*0.5,H2*0.52,20,28,-0.3,0,Math.PI*2); sCtx.fill();
    sCtx.beginPath(); sCtx.arc(W*0.5-10,H2*0.39,13,0,Math.PI*2); sCtx.fill();
    // White hair
    sCtx.strokeStyle='rgba(210,210,190,0.45)'; sCtx.lineWidth=1;
    for(let i=0;i<10;i++){
      sCtx.beginPath();
      sCtx.moveTo(W*0.5-10+(Math.random()-0.5)*22,H2*0.34);
      sCtx.lineTo(W*0.5-10+(Math.random()-0.5)*32,H2*0.27);
      sCtx.stroke();
    }
    // Long reaching arm
    sCtx.fillStyle='#080608';
    sCtx.beginPath();
    sCtx.moveTo(W*0.5+18,H2*0.50); sCtx.lineTo(W*0.5+68,H2*0.65);
    sCtx.lineTo(W*0.5+62,H2*0.68); sCtx.lineTo(W*0.5+10,H2*0.54); sCtx.fill();
    // Eyes — amber glow
    [[-14,0],[0,0]].forEach(([dx])=>{
      const eg=sCtx.createRadialGradient(W*0.5+dx-10,H2*0.39,0,W*0.5+dx-10,H2*0.39,6);
      eg.addColorStop(0,'rgba(255,180,50,0.85)'); eg.addColorStop(1,'transparent');
      sCtx.fillStyle=eg; sCtx.fillRect(W*0.5+dx-16,H2*0.36,12,12);
    });
    // Neon reflection on ground
    const rg=sCtx.createLinearGradient(0,H2*0.42,0,H2);
    rg.addColorStop(0,'rgba(0,180,80,0.06)'); rg.addColorStop(1,'transparent');
    sCtx.fillStyle=rg; sCtx.fillRect(0,H2*0.42,W,H2);
    // Vignette
    const v=sCtx.createRadialGradient(W*0.5,H2*0.5,W*0.08,W*0.5,H2*0.5,W*0.72);
    v.addColorStop(0,'transparent'); v.addColorStop(1,'rgba(0,0,0,0.9)');
    sCtx.fillStyle=v; sCtx.fillRect(0,0,W,H2);
  }

  // Grain
  for(let i=0;i<2500;i++){
    sCtx.fillStyle=`rgba(255,255,255,${Math.random()*0.045})`;
    sCtx.fillRect(Math.random()*W,Math.random()*H2,1,1);
  }
  // Scanlines
  sCtx.fillStyle='rgba(0,0,0,0.22)';
  for(let y=0;y<H2;y+=3) sCtx.fillRect(0,y,W,1);
}

function showStatic(type,msg,dur){
  H.staticActive=true;
  drawStatic(type);
  staticMsg.textContent=msg||'';
  staticFrame.classList.add('active');
  H.staticTimer=dur||2.5;
}

function spawnNenek(){
  const ang=yaw+(Math.random()-0.5)*0.8; // in front, slight random offset
  const dist=12+Math.random()*10;
  nenekGroup.position.set(
    playerPos.x+Math.sin(ang)*dist,
    0,
    playerPos.z+Math.cos(ang)*dist
  );
  nenekGroup.rotation.y=yaw+Math.PI;
  nenekGroup.visible=true;
  H.nenekActive=true; H.nenekPhase='still'; H.nenekTimer=1.5+Math.random()*2;
  subtitle.textContent='NENEK KEBAYAN';
  subtitle.classList.add('visible');
  setTimeout(()=>subtitle.classList.remove('visible'),3000);
  // Turn on radio when nenek appears
  if(radioNode) radioNode.gain.setTargetAtTime(0.18,audioCtx.currentTime,1.0);
}

function updateHorror(dt,elapsed){
  if(!H.staticActive && !H.nenekActive){
    if(elapsed-H.lastEvent>H.nextDelay){
      H.lastEvent=elapsed;
      H.nextDelay=12+Math.random()*30;
      const r=Math.random();
      if     (r<0.30) H.flickerTimer=3+Math.random()*4;
      else if(r<0.55) showStatic('alley',MSGS[Math.floor(Math.random()*MSGS.length)],2+Math.random());
      else if(r<0.80) spawnNenek();
      else            showStatic('nenek','DIA NAMPAK AWAK',3);
    }
  }

  // Flicker
  if(H.flickerTimer>0){
    H.flickerTimer-=dt;
    lampLights.forEach(l=>{
      if(Math.random()>0.45){
        l.light.intensity=Math.random()*l.base;
        if(l.mesh&&l.mesh.material) l.mesh.material.emissiveIntensity=Math.random()*1.5;
      }
    });
    if(Math.random()>0.75){ horrorOverlay.classList.add('flash'); setTimeout(()=>horrorOverlay.classList.remove('flash'),70); }
  } else {
    const t=clock.getElapsedTime();
    lampLights.forEach(l=>{
      l.light.intensity=l.base*(0.90+0.10*Math.sin(t*l.phase));
    });
  }

  // Static frame
  if(H.staticActive){
    H.staticTimer-=dt;
    if(H.staticTimer<=0){ H.staticActive=false; staticFrame.classList.remove('active'); }
  }

  // Antenna blink
  H.antennaBlink+=dt;
  antennaLight.intensity=H.antennaBlink%2<0.15?0.8:0;

  // Nenek logic
  if(H.nenekActive){
    H.nenekTimer-=dt;
    const toPlayer=new THREE.Vector3().subVectors(playerPos,nenekGroup.position);
    const dist=toPlayer.length();

    // Proximity effects
    if(dist<15){
      nenekWarn.classList.add('visible');
      // Radio gets louder closer
      if(radioNode&&audioCtx) radioNode.gain.setTargetAtTime(Math.max(0,(15-dist)/15*0.22),audioCtx.currentTime,0.5);
      // Nenek laugh every few seconds when close
      nenekSoundTimer-=dt;
      if(nenekSoundTimer<=0){ playNenekLaugh(); nenekSoundTimer=3+Math.random()*3; }
    } else {
      nenekWarn.classList.remove('visible');
      nenekSoundTimer=Math.max(nenekSoundTimer,2);
    }

    if(H.nenekPhase==='still'){
      if(H.nenekTimer<=0){ H.nenekPhase='walking'; H.nenekTimer=4+Math.random()*4; }
    } else if(H.nenekPhase==='walking'){
      if(dist>2){
        toPlayer.normalize();
        nenekGroup.position.addScaledVector(toPlayer,1.3*dt);
        nenekGroup.rotation.y=Math.atan2(toPlayer.x,toPlayer.z);
        nenekGroup.position.y=Math.abs(Math.sin(clock.getElapsedTime()*2.5))*0.04;
      }
      if(dist<2.5||H.nenekTimer<=0){
        nenekGroup.visible=false;
        H.nenekActive=false; H.nenekPhase='idle';
        nenekWarn.classList.remove('visible');
        horrorOverlay.classList.add('red'); setTimeout(()=>horrorOverlay.classList.remove('red'),500);
        if(radioNode&&audioCtx) radioNode.gain.setTargetAtTime(0,audioCtx.currentTime,1.5);
        nenekSoundTimer=5;
      }
    }

    // Freeze when player looks at her
    const toCam=new THREE.Vector3().subVectors(nenekGroup.position,camera.position).normalize();
    const camDir=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    if(toCam.dot(camDir)>0.96&&dist<22){
      H.nenekPhase='still'; H.nenekTimer=Math.max(H.nenekTimer,1.5);
      if(radioNode&&audioCtx) radioNode.gain.setTargetAtTime(0.05,audioCtx.currentTime,0.3);
    }
  }
}

// Torch toggle (T key)
document.addEventListener('keydown',e=>{
  if(e.key==='t'||e.key==='T'){
    torchOn=!torchOn;
    document.getElementById('torch-indicator').classList.toggle('on',torchOn);
    torchLight.intensity=torchOn?2.8:0;
  }
});

// ─── FOOTSTEP TIMER ───────────────────────────────────────────
function updateFootsteps(dt){
  const moving=keys.forward||keys.back||keys.left||keys.right;
  if(!moving){ footstepTimer=0; return; }
  const interval=keys.sprint?0.28:0.45;
  footstepTimer+=dt;
  if(footstepTimer>=interval){ playFootstep(); footstepTimer=0; }
}

// ─── HUD ──────────────────────────────────────────────────────
const timeEl=document.getElementById('time-display');
const coordEl=document.getElementById('coords');
let gameMin=3*60+17, lastHUD=0;

function updateHUD(elapsed){
  if(elapsed-lastHUD<1) return;
  lastHUD=elapsed; gameMin=(gameMin+1)%(24*60);
  const h12=gameMin%(12*60); const dh=h12===0?12:Math.floor(h12/60);
  const dm=(gameMin%60).toString().padStart(2,'0');
  const sfx=gameMin<12*60?'AM':'PM';
  timeEl.textContent=`${dh.toString().padStart(2,'0')}:${dm} ${sfx}`;
  const lat=(3.1390+playerPos.z*0.000018).toFixed(4);
  const lon=(101.6869+playerPos.x*0.000018).toFixed(4);
  coordEl.textContent=`${lat}° N, ${lon}° E`;
}

// ─── CLOUDS ───────────────────────────────────────────────────
function updateClouds(dt){
  clouds.forEach(c=>{ c.mesh.position.x+=c.speed*dt; if(c.mesh.position.x>170) c.mesh.position.x=-170; });
}

// ─── HINT FADE ────────────────────────────────────────────────
const hint=document.getElementById('hint');
let hintT=5, hintDone=false;

// ─── MAIN LOOP ────────────────────────────────────────────────
setLoad(92,'hampir siap...');

let prevTime=0;
function animate(timestamp){
  requestAnimationFrame(animate);
  const elapsed=clock.getElapsedTime();
  const dt=Math.min((timestamp-prevTime)/1000,0.05);
  prevTime=timestamp;

  updatePlayer(dt);
  updateClouds(dt);
  updateHorror(dt,elapsed);
  updateHUD(elapsed);
  updateFootsteps(dt);

  // Torch
  torchLight.intensity = torchOn ? 2.8+Math.sin(elapsed*8)*0.05 : 0;

  // Hint
  if(!hintDone){ hintT-=dt; if(hintT<=0){ hint.style.opacity='0'; hintDone=true; } }

  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ─── LAUNCH ───────────────────────────────────────────────────
setLoad(100,'selamat datang ke kawasan');
setTimeout(()=>{
  const lo=document.getElementById('loading');
  lo.style.opacity='0';
  setTimeout(()=>lo.style.display='none',1200);
  requestAnimationFrame(animate);
},1400);

})();
</script>
