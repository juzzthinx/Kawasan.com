<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAWASAN — F12</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; width:100vw; height:100vh; }
#hud {
  position:fixed; top:0; left:0; right:0;
  padding:14px 18px;
  display:flex; justify-content:space-between;
  pointer-events:none; z-index:20;
}
#hud-title { color:#8aaa80; font-family:monospace; font-size:10px; letter-spacing:5px; opacity:0.4; }
#hud-coords { color:#8aaa80; font-family:monospace; font-size:9px; letter-spacing:2px; opacity:0.22; }
#zone-msg {
  position:fixed; top:50%; left:0; right:0;
  transform:translateY(-50%);
  text-align:center;
  font-family:monospace; font-size:11px; letter-spacing:6px;
  color:#8aaa80; opacity:0; transition:opacity 0.6s;
  pointer-events:none; z-index:20; text-transform:uppercase;
}
#look-zone {
  position:fixed; top:0; left:0; right:0; bottom:170px;
  z-index:5; touch-action:none;
}
#ui {
  position:fixed; bottom:0; left:0; right:0;
  padding:12px 0 22px 0;
  display:flex; flex-direction:column; align-items:center;
  pointer-events:none; z-index:10;
}
.dpad {
  display:grid;
  grid-template-columns:58px 58px 58px;
  grid-template-rows:58px 58px;
  gap:5px; pointer-events:all;
}
.btn {
  background:rgba(138,170,128,0.07);
  border:1px solid rgba(138,170,128,0.16);
  border-radius:4px; color:rgba(138,170,128,0.45);
  font-size:20px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; user-select:none;
  -webkit-tap-highlight-color:transparent; touch-action:none;
}
.btn.active { background:rgba(138,170,128,0.2); }
.btn-empty { background:transparent; border:none; pointer-events:none; }
</style>
</head>
<body>
<div id="hud">
  <div id="hud-title">KAWASAN</div>
  <div id="hud-coords">—</div>
</div>
<div id="zone-msg"></div>
<div id="look-zone"></div>
<canvas id="c"></canvas>
<div id="ui">
  <div class="dpad">
    <div class="btn-empty"></div>
    <div class="btn" id="bf">▲</div>
    <div class="btn-empty"></div>
    <div class="btn" id="bl">◀</div>
    <div class="btn" id="bb">▼</div>
    <div class="btn" id="br">▶</div>
  </div>
</div>

<script>
const canvas=document.getElementById('c');
const gl=canvas.getContext('webgl')||canvas.getContext('experimental-webgl');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;gl.viewport(0,0,canvas.width,canvas.height);}
window.addEventListener('resize',resize);resize();

// ── SHADERS ───────────────────────────────────────────────────────────────────
const VS=`
attribute vec3 aPos;
attribute vec2 aUV;
uniform mat4 uMVP;
uniform float uTime;
uniform int uWave;
varying vec2 vUV;
varying float vFog;
varying vec3 vWorld;
void main(){
  vec3 p=aPos;
  if(uWave==1){
    // gentle tree/leaf sway
    p.x+=sin(uTime*1.2+aPos.z*0.5+aPos.y*0.3)*0.12*aPos.y*0.1;
    p.z+=cos(uTime*0.9+aPos.x*0.4)*0.08*aPos.y*0.1;
  }
  vec4 cp=uMVP*vec4(p,1.0);
  gl_Position=cp;
  vUV=aUV;
  vFog=clamp(cp.z/75.0,0.0,1.0);
  vWorld=aPos;
}`;

const FS=`
precision mediump float;
varying vec2 vUV;
varying float vFog;
varying vec3 vWorld;
uniform vec3 uColor;
uniform float uTile;
uniform float uFlicker;
uniform float uAlpha;
uniform int uType;
uniform float uTime;
// 0=concrete 1=sign 2=sky 3=road 4=tile 5=ground
// 6=window 7=leaf 8=trunk 9=mist 10=rain 11=ghost

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
float hash3(vec3 p){return fract(sin(dot(p,vec3(127.1,311.7,74.7)))*43758.5);}
float noise(vec2 p){
  vec2 i=floor(p); vec2 f=fract(p);
  float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
  vec2 u=f*f*(3.0-2.0*f);
  return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
}
float grid(vec2 uv){vec2 g=abs(fract(uv)-0.5);return 1.0-smoothstep(0.0,0.04,min(g.x,g.y));}

void main(){
  vec2 uv=vUV*uTile;
  vec3 col=uColor;
  float fog=pow(vFog,1.1);
  vec3 fogCol=vec3(0.04,0.07,0.04); // green-grey mist
  float alpha=uAlpha;

  if(uType==0){ // concrete
    float n=hash(floor(uv));
    float crack=hash(floor(uv*2.3)+vec2(7.1,3.3));
    col=uColor*(0.8+n*0.1-crack*0.05);
    col+=grid(uv)*0.07*uColor;
    float stain=hash(vec2(floor(uv.x),floor(uv.y*0.4)));
    col*=0.9+stain*0.14;
    // moss patches on lower walls
    float mossy=smoothstep(0.0,2.0,vWorld.y);
    float moss=noise(vWorld.xz*0.8+vec2(3.1,1.4));
    col=mix(col*vec3(0.7,0.9,0.6),col,mossy*0.6+0.4);
    col=mix(col,col*vec3(0.6,0.85,0.5),moss*(1.0-mossy)*0.4);
  }
  else if(uType==1){ // sign
    float brd=step(0.06,vUV.x)*step(vUV.x,0.94)*step(0.08,vUV.y)*step(vUV.y,0.92);
    col=mix(uColor*1.4,uColor,brd);
    if(vUV.y>0.55&&vUV.y<0.70){float t=step(0.0,sin(vUV.x*30.0))*step(0.0,sin(vUV.x*7.0));col=mix(col,uColor*2.4,t*0.8);}
    if(vUV.y>0.30&&vUV.y<0.45){float t=step(0.0,sin(vUV.x*20.0+1.2))*step(0.0,sin(vUV.x*5.0));col=mix(col,uColor*2.0,t*0.65);}
  }
  else if(uType==2){ // sky — overcast night
    float cloud=noise(uv*0.3+vec2(uTime*0.01,0.0));
    col=mix(uColor,uColor*1.4,cloud*0.3);
    float star=step(0.994,hash(floor(uv*30.0)));
    col+=vec3(star*0.5)*(1.0-cloud*0.8);
  }
  else if(uType==3){ // road
    float n=hash(floor(uv*3.0));
    col=uColor*(0.85+n*0.1);
    float dsh=step(0.46,vUV.x)*step(vUV.x,0.54);
    float dlng=step(0.0,sin(vUV.y*uTile*3.14));
    col=mix(col,vec3(0.6,0.6,0.55),dsh*dlng*0.5);
    // wet sheen
    float wet=noise(uv*2.0+vec2(0.0,uTime*0.1))*0.15;
    col+=vec3(wet*0.3,wet*0.4,wet*0.3);
  }
  else if(uType==4){ // floor tile
    float n=hash(floor(uv));
    col=uColor*(0.82+n*0.1);
    col+=grid(uv)*0.09*uColor;
  }
  else if(uType==5){ // ground / mud
    float n=noise(uv*1.5);
    float b=hash(floor(uv*4.0));
    col=uColor*(0.7+n*0.2+b*0.06);
    // puddles
    float puddle=smoothstep(0.55,0.75,noise(uv*0.8+vec2(1.3,2.1)));
    col=mix(col,vec3(0.08,0.12,0.08)*1.2,puddle*0.5);
  }
  else if(uType==6){ // window
    float frame=1.0-step(0.1,vUV.x)*step(vUV.x,0.9)*step(0.08,vUV.y)*step(vUV.y,0.92);
    col=mix(uColor*0.12,uColor*0.35,frame);
    float glow=hash(floor(vUV*0.5+vec2(1.3,2.7)));
    if(glow>0.72) col+=vec3(0.02,0.05,0.02)*step(0.1,vUV.x)*step(vUV.x,0.9);
  }
  else if(uType==7){ // leaves — jungle canopy
    float n=noise(uv*3.0+vec2(uTime*0.2,0.0));
    float hole=step(0.42,n); // transparency via discard-like darkening
    col=uColor*(0.7+n*0.4);
    if(hole<0.5) alpha=0.0; // discard dark patches = see-through gaps
    else alpha=uAlpha*(0.6+n*0.4);
  }
  else if(uType==8){ // trunk / branch
    float n=hash(floor(uv*4.0));
    col=uColor*(0.75+n*0.15);
    // bark lines
    float bark=step(0.0,sin(vUV.y*uTile*6.28*2.0))*0.1;
    col*=1.0-bark*0.2;
  }
  else if(uType==9){ // mist / fog plane
    float n=noise(uv*0.5+vec2(uTime*0.05,uTime*0.02));
    float n2=noise(uv*1.2-vec2(uTime*0.03,0.0));
    float density=(n*0.6+n2*0.4);
    alpha=uAlpha*density*0.7*(1.0-vFog*0.5);
    col=uColor*(0.8+density*0.3);
  }
  else if(uType==10){ // rain streak
    float streak=step(0.85,hash(floor(uv*vec2(40.0,8.0))+vec2(floor(uTime*12.0),0.0)));
    alpha=streak*0.25*(1.0-vFog*0.8);
    col=vec3(0.6,0.7,0.65);
  }
  else if(uType==11){ // ghost / white mist figure
    float cx=abs(vUV.x-0.5)*2.0;
    float cy=vUV.y;
    // body silhouette — head + torso
    float head=smoothstep(0.25,0.0,length(vec2(cx,cy-0.82)*vec2(1.0,1.4)));
    float body=smoothstep(0.5,0.0,length(vec2(cx*0.7,(cy-0.38)*0.6)));
    float shape=clamp(head+body,0.0,1.0);
    float n=noise(uv*3.0+vec2(uTime*0.3,uTime*0.2));
    float flicker2=0.5+0.5*sin(uTime*3.1+n*6.28);
    alpha=shape*uAlpha*flicker2*(0.4+n*0.3);
    col=vec3(0.88,0.94,0.90);
  }

  col*=uFlicker;
  // outdoor gets greener fog, indoor gets darker
  col=mix(col,fogCol,fog*0.85);
  gl_FragColor=vec4(col,alpha);
}`;

function mkShader(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);return sh;}
const prog=gl.createProgram();
gl.attachShader(prog,mkShader(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,mkShader(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);gl.useProgram(prog);

const LOC={
  aPos:gl.getAttribLocation(prog,'aPos'),
  aUV:gl.getAttribLocation(prog,'aUV'),
  uMVP:gl.getUniformLocation(prog,'uMVP'),
  uColor:gl.getUniformLocation(prog,'uColor'),
  uTile:gl.getUniformLocation(prog,'uTile'),
  uFlicker:gl.getUniformLocation(prog,'uFlicker'),
  uAlpha:gl.getUniformLocation(prog,'uAlpha'),
  uType:gl.getUniformLocation(prog,'uType'),
  uTime:gl.getUniformLocation(prog,'uTime'),
  uWave:gl.getUniformLocation(prog,'uWave'),
};

// ── MATH ──────────────────────────────────────────────────────────────────────
const m4=()=>new Float32Array(16);
function ident(m){for(let i=0;i<16;i++)m[i]=0;m[0]=m[5]=m[10]=m[15]=1;return m;}
function persp(m,fov,asp,n,f){ident(m);const t=1/Math.tan(fov/2);m[0]=t/asp;m[5]=t;m[10]=(f+n)/(n-f);m[11]=-1;m[14]=(2*f*n)/(n-f);m[15]=0;return m;}
function mul(o,a,b){for(let i=0;i<4;i++)for(let j=0;j<4;j++){o[j*4+i]=0;for(let k=0;k<4;k++)o[j*4+i]+=a[k*4+i]*b[j*4+k];}return o;}

// ── MESH ──────────────────────────────────────────────────────────────────────
const meshes=[];
function mkQ(x0,y0,z0,x1,y1,z1,x2,y2,z2,x3,y3,z3,col,tile,type,flickRate,alpha,wave){
  const v=[x0,y0,z0,x1,y1,z1,x2,y2,z2,x2,y2,z2,x3,y3,z3,x0,y0,z0];
  const u=[0,0,1,0,1,1,1,1,0,1,0,0];
  const d=[];for(let i=0;i<6;i++)d.push(v[i*3],v[i*3+1],v[i*3+2],u[i*2],u[i*2+1]);
  const buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(d),gl.STATIC_DRAW);
  meshes.push({buf,count:6,color:col,tile:tile||1,type:type||0,
    flickRate:flickRate||0,alpha:alpha||1.0,wave:wave||0,
    _on:true,_t:Math.random()*4,transparent:(alpha||1.0)<1.0||(type===9||type===10||type===11||type===7)});
}

// ── PRIMITIVES ────────────────────────────────────────────────────────────────
const IH=3.5,SW=7;
const C={
  conc:[0.40,0.42,0.38],concDk:[0.28,0.30,0.26],concLt:[0.50,0.52,0.48],
  tile:[0.36,0.38,0.34],road:[0.20,0.22,0.19],sky:[0.03,0.05,0.04],
  ground:[0.14,0.18,0.12],ppr:[0.42,0.44,0.40],pprAcc:[0.28,0.32,0.26],
  sGreen:[0.07,0.20,0.09],sBlue:[0.07,0.10,0.20],sYellow:[0.22,0.20,0.05],
  win:[0.08,0.12,0.10],light:[0.80,0.86,0.70],
  leafDk:[0.08,0.22,0.06],leafMd:[0.12,0.30,0.08],leafLt:[0.18,0.38,0.10],
  trunk:[0.18,0.14,0.10],mud:[0.12,0.16,0.10],mist:[0.60,0.72,0.60],
};

function fl(x0,z0,x1,z1,y,col,tile,type){mkQ(x0,y,z0,x1,y,z0,x1,y,z1,x0,y,z1,col,tile,type||4,0,1.0);}
function cl(x0,z0,x1,z1,y,col,tile){mkQ(x0,y,z0,x0,y,z1,x1,y,z1,x1,y,z0,col,tile||4,0,0,1.0);}
function wN(x0,x1,z,y0,y1,col,tile){mkQ(x0,y0,z,x1,y0,z,x1,y1,z,x0,y1,z,col,tile||5,0);}
function wS(x0,x1,z,y0,y1,col,tile){mkQ(x1,y0,z,x0,y0,z,x0,y1,z,x1,y1,z,col,tile||5,0);}
function wW(z0,z1,x,y0,y1,col,tile){mkQ(x,y0,z1,x,y0,z0,x,y1,z0,x,y1,z1,col,tile||5,0);}
function wE(z0,z1,x,y0,y1,col,tile){mkQ(x,y0,z0,x,y0,z1,x,y1,z1,x,y1,z0,col,tile||5,0);}

function room(x0,z0,x1,z1,h,ftype){
  fl(x0,z0,x1,z1,0,C.tile,8,ftype||4);
  cl(x0,z0,x1,z1,h,C.concDk,5);
  wW(z0,z1,x0,0,h,C.conc,6);wE(z0,z1,x1,0,h,C.conc,6);
  wN(x0,x1,z0,0,h,C.conc,6);wS(x0,x1,z1,0,h,C.conc,6);
}

function lit(x,z,h,rate){
  mkQ(x-.25,h-.02,z,x+.25,h-.02,z,x+.25,h-.02,z+1.3,x-.25,h-.02,z+1.3,C.light,1,0,rate||0,1.0);
}
function sign(x,y,z,w,h,face,col){
  const o=0.06;
  if(face==='s')mkQ(x,y,z-o,x+w,y,z-o,x+w,y+h,z-o,x,y+h,z-o,col,1,1,0,1.0);
  if(face==='n')mkQ(x+w,y,z+o,x,y,z+o,x,y+h,z+o,x+w,y+h,z+o,col,1,1,0,1.0);
  if(face==='e')mkQ(x+o,y,z,x+o,y,z+w,x+o,y+h,z+w,x+o,y+h,z,col,1,1,0,1.0);
  if(face==='w')mkQ(x-o,y,z+w,x-o,y,z,x-o,y+h,z,x-o,y+h,z+w,col,1,1,0,1.0);
}
function pillar(x,z,h){
  const s=0.55;
  fl(x,z,x+s,z+s,h,C.concDk,2);
  wW(z,z+s,x,0,h,C.concDk,2);wE(z,z+s,x+s,0,h,C.concDk,2);
  wN(x,x+s,z,0,h,C.conc,2);wS(x,x+s,z+s,0,h,C.conc,2);
}
function ppr(bx,bz,bw,bh,bd,face){
  if(face==='s')wN(bx,bx+bw,bz,0,bh,C.ppr,8);
  if(face==='n')wS(bx,bx+bw,bz,0,bh,C.ppr,8);
  if(face==='e')wW(bz,bz+bd,bx,0,bh,C.ppr,8);
  if(face==='w')wE(bz,bz+bd,bx+bw,0,bh,C.ppr,8);
  for(let fy=3;fy<bh;fy+=3){
    if(face==='s')mkQ(bx,fy,bz-.05,bx+bw,fy,bz-.05,bx+bw,fy+.12,bz-.05,bx,fy+.12,bz-.05,C.pprAcc,1,0);
    if(face==='n')mkQ(bx+bw,fy,bz+.05,bx,fy,bz+.05,bx,fy+.12,bz+.05,bx+bw,fy+.12,bz+.05,C.pprAcc,1,0);
    if(face==='e')mkQ(bx+.05,fy,bz,bx+.05,fy,bz+bd,bx+.05,fy+.12,bz+bd,bx+.05,fy+.12,bz,C.pprAcc,1,0);
    if(face==='w')mkQ(bx+bw-.05,fy,bz+bd,bx+bw-.05,fy,bz,bx+bw-.05,fy+.12,bz,bx+bw-.05,fy+.12,bz+bd,C.pprAcc,1,0);
  }
  const wRows=Math.floor(bh/3)-1,wCols=Math.floor(bw/3);
  for(let r=0;r<wRows;r++)for(let c=0;c<wCols;c++){
    const wx=bx+c*3+.6,wy=r*3+.8,ww=1.6,wh=1.4;
    if(face==='s')mkQ(wx,wy,bz-.04,wx+ww,wy,bz-.04,wx+ww,wy+wh,bz-.04,wx,wy+wh,bz-.04,C.win,1,6);
    if(face==='n')mkQ(wx+ww,wy,bz+.04,wx,wy,bz+.04,wx,wy+wh,bz+.04,wx+ww,wy+wh,bz+.04,C.win,1,6);
  }
}

// ── JUNGLE ────────────────────────────────────────────────────────────────────
function tree(x,z,h,spread){
  const th=h*.35;
  // trunk
  const tw=0.22;
  wW(z-tw,z+tw,x-tw,0,th,C.trunk,3);wE(z-tw,z+tw,x+tw,0,th,C.trunk,3);
  wN(x-tw,x+tw,z-tw,0,th,C.trunk,3);wS(x-tw,x+tw,z+tw,0,th,C.trunk,3);
  // canopy layers — billboard quads crossing
  const lc=[C.leafDk,C.leafMd,C.leafLt];
  for(let l=0;l<3;l++){
    const ly=th+l*(h-th)/3;
    const ls=spread*(1.0-l*0.2);
    const col=lc[l];
    // X billboard
    mkQ(x-ls,ly,z,x+ls,ly,z,x+ls,ly+ls*1.4,z,x-ls,ly+ls*1.4,z,col,2,7,0,0.92,1);
    // Z billboard
    mkQ(x,ly,z-ls,x,ly,z+ls,x,ly+ls*1.4,z+ls,x,ly+ls*1.4,z-ls,col,2,7,0,0.92,1);
    // diagonal
    mkQ(x-ls*.7,ly,z-ls*.7,x+ls*.7,ly,z+ls*.7,x+ls*.7,ly+ls*1.2,z+ls*.7,x-ls*.7,ly+ls*1.2,z-ls*.7,col,2,7,0,0.88,1);
  }
}

function bush(x,z,h){
  const col=C.leafDk;
  const s=h;
  mkQ(x-s,0,z,x+s,0,z,x+s,h*1.5,z,x-s,h*1.5,z,col,1,7,0,0.9,1);
  mkQ(x,0,z-s,x,0,z+s,x,h*1.5,z+s,x,h*1.5,z-s,col,1,7,0,0.9,1);
}

function groundVines(x0,z0,x1,z1){
  fl(x0,z0,x1,z1,0.02,C.leafDk,4,7);
}

// Mist plane — large horizontal quad at ground level
function mistPlane(x0,z0,x1,z1,y){
  mkQ(x0,y,z0,x1,y,z0,x1,y,z1,x0,y,z1,C.mist,3,9,0,0.55);
}

// Rain — vertical streaks as billboard planes
function rainLayer(x,z,w,d,y0,y1){
  mkQ(x,y1,z,x+w,y1,z,x+w,y0,z,x,y0,z,C.mist,6,10,0,0.3);
  mkQ(x,y1,z+d*.5,x+w,y1,z+d*.5,x+w,y0,z+d*.5,x,y0,z+d*.5,C.mist,6,10,0,0.3);
}

// ── GHOST ─────────────────────────────────────────────────────────────────────
// Ghost is dynamic — rendered each frame at computed position
let ghostMesh=null;
function makeGhost(){
  const d=[];
  const v=[0,0,0,1,0,0,1,2,0,1,2,0,0,2,0,0,0,0];
  const u=[0,0,1,0,1,1,1,1,0,1,0,0];
  for(let i=0;i<6;i++)d.push(v[i*3],v[i*3+1],v[i*3+2],u[i*2],u[i*2+1]);
  const buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);

// ── CAMERA ────────────────────────────────────────────────────────────────────
const cam={x:9,y:1.72,z:2,yaw:0,pitch:0};
function viewMat(){
  const cy=Math.cos(cam.yaw),sy=Math.sin(cam.yaw);
  const cp=Math.cos(cam.pitch),sp=Math.sin(cam.pitch);
  const rx=[cy,0,-sy],ry=[sy*sp,cp,cy*sp],rz=[sy*cp,-sp,cy*cp];
  const tx=-(rx[0]*cam.x+rx[1]*cam.y+rx[2]*cam.z);
  const ty=-(ry[0]*cam.x+ry[1]*cam.y+ry[2]*cam.z);
  const tz=-(rz[0]*cam.x+rz[1]*cam.y+rz[2]*cam.z);
  const m=m4();
  m[0]=rx[0];m[4]=rx[1];m[8]=rx[2];m[12]=tx;
  m[1]=ry[0];m[5]=ry[1];m[9]=ry[2];m[13]=ty;
  m[2]=rz[0];m[6]=rz[1];m[10]=rz[2];m[14]=tz;
  m[3]=0;m[7]=0;m[11]=0;m[15]=1;
  return m;
}

// ── GHOST LOGIC ───────────────────────────────────────────────────────────────
// Ghost appears 25-35 units ahead in the Z direction, centered on corridor
// Fades out when player gets within 8 units
function ghostVisible(t){
  // appears in infinite corridor or long corridors
  return cam.z>80;
}
function ghostPos(t){
  const ahead=28+Math.sin(t*0.15)*5;
  const gz=cam.z+ahead;
  const gx=9+Math.sin(t*0.08)*0.8; // slight drift
  return{x:gx,z:gz};
}
function ghostAlpha(t){
  const gp=ghostPos(t);
  const dist=Math.sqrt((gp.x-cam.x)**2+(gp.z-cam.z)**2);
  if(dist<8)return 0; // vanishes when you get close
  if(dist>40)return 0;
  return Math.min(1,(dist-8)/12)*0.7*(0.5+0.5*Math.sin(t*1.7));
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
const keys={},mv={f:0,b:0,l:0,r:0};
window.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
let lx=null,ly=null;
const lzone=document.getElementById('look-zone');
lzone.addEventListener('touchstart',e=>{const t=e.touches[0];lx=t.clientX;ly=t.clientY;},{passive:true});
lzone.addEventListener('touchmove',e=>{
  e.preventDefault();const t=e.touches[0];
  if(lx!==null){cam.yaw-=(t.clientX-lx)*.003;cam.pitch-=(t.clientY-ly)*.003;}
  cam.pitch=Math.max(-.9,Math.min(.9,cam.pitch));
  lx=t.clientX;ly=t.clientY;
},{passive:false});
lzone.addEventListener('touchend',()=>{lx=null;ly=null;});
function bindBtn(id,p){
  const el=document.getElementById(id);
  ['touchstart','mousedown'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();mv[p]=1;el.classList.add('active');},{passive:false}));
  ['touchend','mouseup','touchcancel'].forEach(ev=>el.addEventListener(ev,()=>{mv[p]=0;el.classList.remove('active');}));
}
bindBtn('bf','f');bindBtn('bb','b');bindBtn('bl','l');bindBtn('br','r');

// ── FLICKER ───────────────────────────────────────────────────────────────────
function tickFlicker(dt){
  meshes.forEach(m=>{
    if(m.flickRate<=0)return;
    m._t-=dt;
    if(m._t<=0){m._on=!m._on;m._t=m._on?(1.5+Math.random()*5):(0.04+Math.random()*.2*m.flickRate);}
  });
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function drawMesh(mesh,vp,t){
  gl.bindBuffer(gl.ARRAY_BUFFER,mesh.buf);
  gl.vertexAttribPointer(LOC.aPos,3,gl.FLOAT,false,20,0);gl.enableVertexAttribArray(LOC.aPos);
  gl.vertexAttribPointer(LOC.aUV,2,gl.FLOAT,false,20,12);gl.enableVertexAttribArray(LOC.aUV);
  gl.uniformMatrix4fv(LOC.uMVP,false,vp);
  gl.uniform3fv(LOC.uColor,mesh.color);
  gl.uniform1f(LOC.uTile,mesh.tile);
  gl.uniform1i(LOC.uType,mesh.type);
  gl.uniform1i(LOC.uWave,mesh.wave||0);
  gl.uniform1f(LOC.uAlpha,mesh.alpha||1.0);
  let flk=mesh.flickRate>0?(mesh._on?(0.9+.1*Math.sin(t*18)):0):(0.97+.03*Math.sin(t*.5));
  gl.uniform1f(LOC.uFlicker,flk);
  gl.drawArrays(gl.TRIANGLES,0,mesh.count);
}

function drawGhost(vp,t){
  if(!ghostVisible(t))return;
  const ga=ghostAlpha(t);
  if(ga<=0)return;
  const gp=ghostPos(t);
  // update ghost quad to face camera (billboard)
  const dx=cam.x-gp.x,dz=cam.z-gp.z;
  const angle=Math.atan2(dx,dz);
  const cos=Math.cos(angle),sin=Math.sin(angle);
  const w=0.6,h=1.9;
  const x0=gp.x-cos*w,z0=gp.z+sin*w;
  const x1=gp.x+cos*w,z1=gp.z-sin*w;
  const data=[
    x0,0,z0,0,0,
    x1,0,z1,1,0,
    x1,h,z1,1,1,
    x1,h,z1,1,1,
    x0,h,z0,0,1,
    x0,0,z0,0,0,
  ];
  gl.bindBuffer(gl.ARRAY_BUFFER,ghostBuf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(data),gl.DYNAMIC_DRAW);
  gl.vertexAttribPointer(LOC.aPos,3,gl.FLOAT,false,20,0);gl.enableVertexAttribArray(LOC.aPos);
  gl.vertexAttribPointer(LOC.aUV,2,gl.FLOAT,false,20,12);gl.enableVertexAttribArray(LOC.aUV);
  gl.uniformMatrix4fv(LOC.uMVP,false,vp);
  gl.uniform3fv(LOC.uColor,[0.88,0.94,0.90]);
  gl.uniform1f(LOC.uTile,1);
  gl.uniform1i(LOC.uType,11);
  gl.uniform1i(LOC.uWave,0);
  gl.uniform1f(LOC.uAlpha,ga);
  gl.uniform1f(LOC.uFlicker,1.0);
  gl.drawArrays(gl.TRIANGLES,0,6);
}

// ── LOOP ──────────────────────────────────────────────────────────────────────
let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,.05);last=ts;
  const t=ts/1000;
  const spd=5.5;
  const sy=Math.sin(cam.yaw),cy=Math.cos(cam.yaw);
  const fwd=mv.f||keys['w']||keys['arrowup']?1:0;
  const bwd=mv.b||keys['s']||keys['arrowdown']?1:0;
  const lft=mv.l||keys['a']||keys['arrowleft']?1:0;
  const rgt=mv.r||keys['d']||keys['arrowright']?1:0;
  cam.x+=(sy*(fwd-bwd)+cy*(rgt-lft))*spd*dt;
  cam.z+=(cy*(fwd-bwd)-sy*(rgt-lft))*spd*dt;
  tickFlicker(dt);checkZone();
  document.getElementById('hud-coords').textContent=`${cam.x.toFixed(1)} · ${cam.z.toFixed(1)}`;
  gl.enable(gl.DEPTH_TEST);
  gl.clearColor(.01,.02,.01,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  const proj=persp(m4(),1.05,canvas.width/canvas.height,.1,100);
  const view=viewMat();
  const vp=mul(m4(),proj,view);
  gl.uniform1f(LOC.uTime,t);
  // opaque first
  gl.disable(gl.BLEND);
  meshes.filter(m=>!m.transparent).forEach(m=>drawMesh(m,vp,t));
  // transparent after
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
  meshes.filter(m=>m.transparent).forEach(m=>drawMesh(m,vp,t));
  drawGhost(vp,t);
  gl.disable(gl.BLEND);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
