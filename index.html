<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAWASAN — F12</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  #canvas { display: block; width: 100vw; height: 100vh; }

  #no-webgl {
    display: none;
    position: fixed; inset: 0;
    background: #000;
    color: #ccc;
    font-size: 1.2rem;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    text-align: center;
    padding: 2rem;
  }

  /* LOADING SCREEN */
  #loading {
    position: fixed; inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1.5rem;
    z-index: 100;
    transition: opacity 1s ease;
  }
  #loading h1 {
    color: #e8e0d0;
    font-size: clamp(2rem, 8vw, 5rem);
    letter-spacing: 0.4em;
    font-weight: 100;
    font-family: 'Courier New', monospace;
  }
  #loading p {
    color: #666;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }
  #loading-bar-wrap {
    width: 200px;
    height: 1px;
    background: #222;
  }
  #loading-bar {
    height: 1px;
    background: #e8e0d0;
    width: 0%;
    transition: width 0.3s ease;
  }
  #loading-sub {
    color: #444;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
  }

  /* HUD */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }
  #brand {
    position: absolute;
    top: 1.5rem; left: 50%;
    transform: translateX(-50%);
    color: rgba(232,224,208,0.35);
    font-size: 0.65rem;
    letter-spacing: 0.5em;
    text-transform: uppercase;
  }
  #time-display {
    position: absolute;
    bottom: 1.5rem; left: 1.5rem;
    color: rgba(232,224,208,0.25);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
  }
  #coords {
    position: absolute;
    bottom: 1.5rem; right: 1.5rem;
    color: rgba(232,224,208,0.2);
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-align: right;
  }

  /* DPAD */
  #dpad {
    position: fixed;
    bottom: 3rem; left: 50%;
    transform: translateX(-50%);
    display: grid;
    grid-template-columns: repeat(3, 48px);
    grid-template-rows: repeat(3, 48px);
    gap: 4px;
    z-index: 20;
    pointer-events: all;
  }
  #dpad button {
    background: rgba(232,224,208,0.08);
    border: 1px solid rgba(232,224,208,0.15);
    color: rgba(232,224,208,0.6);
    font-size: 1rem;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: manipulation;
  }
  #dpad button:active, #dpad button.pressed {
    background: rgba(232,224,208,0.2);
    border-color: rgba(232,224,208,0.4);
  }
  #dpad .empty { visibility: hidden; }
  #dpad #btn-sprint {
    background: rgba(232,224,208,0.05);
    font-size: 0.5rem;
    letter-spacing: 0.05em;
    color: rgba(232,224,208,0.4);
  }

  /* HORROR OVERLAY */
  #horror-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0);
    pointer-events: none;
    z-index: 50;
    transition: background 0.3s ease;
  }
  #horror-overlay.flash {
    background: rgba(255,255,255,0.03);
  }
  #horror-overlay.red-flash {
    background: rgba(80,0,0,0.15);
  }

  /* STILL FRAME */
  #still-frame {
    position: fixed; inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 60;
    background: #000;
  }
  #still-frame.active { display: flex; }
  #still-frame canvas {
    width: 100vw;
    height: 100vh;
    image-rendering: pixelated;
    filter: contrast(1.4) brightness(0.7) saturate(0.2);
  }
  #still-frame-text {
    position: absolute;
    bottom: 15%;
    color: rgba(200,190,170,0.7);
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    font-family: 'Courier New', monospace;
    text-transform: uppercase;
  }

  /* NENEK subtitle */
  #nenek-text {
    position: fixed;
    bottom: 20%;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(200,180,150,0.0);
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    pointer-events: none;
    z-index: 55;
    transition: color 0.5s ease;
    text-align: center;
  }
  #nenek-text.visible { color: rgba(200,180,150,0.8); }

  /* Vignette */
  #vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
    z-index: 5;
  }

  /* CONTROLS HINT */
  #controls-hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(232,224,208,0.5);
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-align: center;
    z-index: 15;
    pointer-events: none;
    transition: opacity 2s ease;
  }
  #controls-hint p { margin-bottom: 0.4rem; }
</style>
</head>
<body>

<div id="no-webgl">
  <div>KAWASAN</div>
  <div style="color:#555; font-size:0.8rem">WEBGL TIDAK DISOKONG<br>CUBA PELAYAR LAIN</div>
</div>

<div id="loading">
  <p style="color:#555; font-size:0.6rem; letter-spacing:0.4em">F12 PRESENTS</p>
  <h1>KAWASAN</h1>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-sub">memuatkan dunia...</div>
</div>

<div id="hud">
  <div id="brand">KAWASAN — F12</div>
  <div id="time-display">03:17 AM</div>
  <div id="coords">3.1390° N, 101.6869° E</div>
</div>

<div id="vignette"></div>
<div id="horror-overlay"></div>
<div id="nenek-text"></div>

<div id="still-frame">
  <canvas id="still-canvas" width="640" height="360"></canvas>
  <div id="still-frame-text"></div>
</div>

<div id="dpad">
  <button class="empty"></button>
  <button id="btn-up" data-dir="forward">▲</button>
  <button id="btn-sprint" data-dir="sprint">RUN</button>
  <button id="btn-left" data-dir="left">◀</button>
  <button id="btn-down" data-dir="back">▼</button>
  <button id="btn-right" data-dir="right">▶</button>
  <button class="empty"></button>
  <button class="empty"></button>
  <button class="empty"></button>
</div>

<div id="controls-hint">
  <p>WASD / ARROW KEYS</p>
  <p style="color:rgba(232,224,208,0.3)">SHIFT untuk lari</p>
</div>

<canvas id="canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// KAWASAN v2 — F12
// KL Liminal Horror Open World
// ============================================================

(function() {

// ---- WEBGL CHECK ----
const canvas = document.getElementById('canvas');
const noWebGL = document.getElementById('no-webgl');
try {
  const testCtx = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!testCtx) throw new Error('no webgl');
} catch(e) {
  noWebGL.style.display = 'flex';
  document.getElementById('loading').style.display = 'none';
  return;
}

// ---- SCENE SETUP ----
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.5;
renderer.fog = new THREE.FogExp2(0x0a0a0f, 0.018);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = renderer.fog;

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(0, 1.7, 0);

const clock = new THREE.Clock();
const loadingBar = document.getElementById('loading-bar');
const loadingSub = document.getElementById('loading-sub');

// ---- LOADING PROGRESS SIM ----
let loadProgress = 0;
function advanceLoad(pct, msg) {
  loadProgress = pct;
  loadingBar.style.width = pct + '%';
  if (msg) loadingSub.textContent = msg;
}

// ============================================================
// WORLD GEOMETRY — KL Liminal Streets
// ============================================================

const MAT = {
  road: new THREE.MeshLambertMaterial({ color: 0x111114 }),
  sidewalk: new THREE.MeshLambertMaterial({ color: 0x1a1a1e }),
  wall: new THREE.MeshLambertMaterial({ color: 0x141416 }),
  wall2: new THREE.MeshLambertMaterial({ color: 0x0f0f12 }),
  wall3: new THREE.MeshLambertMaterial({ color: 0x18141a }),
  shopfront: new THREE.MeshLambertMaterial({ color: 0x0c0c0e }),
  ceiling: new THREE.MeshLambertMaterial({ color: 0x0a0a0c }),
  flicker: new THREE.MeshStandardMaterial({ color: 0xffeecc, emissive: 0xffddaa, emissiveIntensity: 0.6 }),
  neon_r: new THREE.MeshStandardMaterial({ color: 0xff2222, emissive: 0xff1111, emissiveIntensity: 1.2 }),
  neon_g: new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff66, emissiveIntensity: 1.0 }),
  neon_b: new THREE.MeshStandardMaterial({ color: 0x4488ff, emissive: 0x3366ff, emissiveIntensity: 1.0 }),
  neon_y: new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0xffaa00, emissiveIntensity: 0.8 }),
  pole: new THREE.MeshLambertMaterial({ color: 0x222225 }),
  glass: new THREE.MeshStandardMaterial({ color: 0x334455, transparent: true, opacity: 0.3, roughness: 0.1 }),
};

const worldGroup = new THREE.Group();
scene.add(worldGroup);

function box(w, h, d, mat, x, y, z, rx, ry, rz) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  if (rx) m.rotation.x = rx;
  if (ry) m.rotation.y = ry;
  if (rz) m.rotation.z = rz;
  m.receiveShadow = true;
  m.castShadow = true;
  worldGroup.add(m);
  return m;
}

function cyl(r, h, mat, x, y, z, segs) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(r, r, h, segs || 8), mat);
  m.position.set(x, y, z);
  m.castShadow = true;
  worldGroup.add(m);
  return m;
}

// ---- GROUND ----
advanceLoad(10, 'membina jalanan...');
box(200, 0.1, 200, MAT.road, 0, -0.05, 0);

// ---- MAIN STREET (runs along Z axis) ----
// 8m wide road, 1.5m sidewalk each side
const STREET_W = 8;
const BLOCK_LEN = 40;
const NUM_BLOCKS = 6;

// Sidewalk strips
for (let i = 0; i < NUM_BLOCKS; i++) {
  const z = i * BLOCK_LEN - NUM_BLOCKS * BLOCK_LEN * 0.5;
  box(1.5, 0.12, BLOCK_LEN, MAT.sidewalk, -(STREET_W * 0.5 + 0.75), 0.06, z + BLOCK_LEN * 0.5);
  box(1.5, 0.12, BLOCK_LEN, MAT.sidewalk, (STREET_W * 0.5 + 0.75), 0.06, z + BLOCK_LEN * 0.5);
}

// ---- SHOPHOUSES — KL 5-foot-way style ----
// Classic pre-war double storey shophouses
function buildShophouse(x, z, flipped, wallMat) {
  const sign = flipped ? 1 : -1;
  const offsetX = sign * (STREET_W * 0.5 + 1.5 + 6);

  // Main structure
  box(12, 7, 8, wallMat, offsetX, 3.5, z);
  // 5-foot-way ceiling (covered walkway)
  box(3, 0.2, 8, MAT.ceiling, offsetX - sign * 4.5, 3.0, z);
  // 5-foot-way pillars
  for (let pz = z - 3; pz <= z + 3; pz += 3) {
    cyl(0.12, 3.0, MAT.pole, offsetX - sign * 4.5, 1.5, pz, 6);
  }
  // Shopfront opening (recessed)
  box(4, 2.5, 0.3, MAT.shopfront, offsetX, 1.25, z - 4.01);
  // Upper window details
  box(2.5, 1.2, 0.1, MAT.glass, offsetX, 5.2, z - 4.02);
  // Second floor overhang detail
  box(12.2, 0.15, 0.5, MAT.wall2, offsetX, 3.6, z - 4.1);
}

// Place shophouses along both sides
for (let i = 0; i < NUM_BLOCKS; i++) {
  const z = (i - NUM_BLOCKS * 0.5) * BLOCK_LEN + BLOCK_LEN * 0.5;
  const matL = i % 3 === 0 ? MAT.wall2 : i % 3 === 1 ? MAT.wall3 : MAT.wall;
  const matR = i % 3 === 1 ? MAT.wall2 : i % 3 === 2 ? MAT.wall3 : MAT.wall;
  buildShophouse(-1, z, false, matL);
  buildShophouse(1, z, true, matR);
}

// ---- CROSS STREETS (perpendicular alleys) ----
advanceLoad(25, 'membina lorong...');
for (let i = 1; i < NUM_BLOCKS; i++) {
  const z = (i - NUM_BLOCKS * 0.5) * BLOCK_LEN;
  // Side alley floors
  box(30, 0.1, 6, MAT.road, 0, -0.04, z);
  // Alley walls (darker, oppressive)
  box(0.3, 5, 30, MAT.wall2, -20, 2.5, z);
  box(0.3, 5, 30, MAT.wall2, 20, 2.5, z);
}

// ---- OVERHEAD WIRING / CABLES ----
const wireMat = new THREE.LineBasicMaterial({ color: 0x1a1a1a });
for (let i = 0; i < 20; i++) {
  const pts = [];
  const startZ = (Math.random() - 0.5) * NUM_BLOCKS * BLOCK_LEN;
  const sag = 0.3 + Math.random() * 0.4;
  for (let t = 0; t <= 1; t += 0.1) {
    pts.push(new THREE.Vector3(
      -14 + (28 * t),
      5.5 - sag * 4 * t * (1 - t),
      startZ + (Math.random() - 0.5) * 2
    ));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  worldGroup.add(new THREE.Line(geo, wireMat));
}

// ---- LAMP POSTS ----
const lampLights = [];
advanceLoad(35, 'menyalakan lampu...');
for (let i = -NUM_BLOCKS * 0.5; i <= NUM_BLOCKS * 0.5; i++) {
  const z = i * BLOCK_LEN * 0.5;
  [-1, 1].forEach(side => {
    const lx = side * (STREET_W * 0.5 + 0.5);
    // Pole
    cyl(0.06, 5.5, MAT.pole, lx, 2.75, z, 6);
    // Arm
    box(1.2, 0.06, 0.06, MAT.pole, lx + side * 0.5, 5.5, z);
    // Lamp head
    const lamp = box(0.3, 0.2, 0.3, MAT.flicker, lx + side * 1.1, 5.45, z);
    // Point light
    const pl = new THREE.PointLight(0xffe8c0, 0.9, 18, 2);
    pl.position.set(lx + side * 1.1, 5.3, z);
    scene.add(pl);
    lampLights.push({ light: pl, lamp, base: 0.9, phase: Math.random() * Math.PI * 2 });
  });
}

// ---- NEON SIGNS ----
advanceLoad(45, 'menghidupkan papan tanda...');
const neonSigns = [
  { text: 'MAMAK', mat: MAT.neon_r, x: -20, y: 4.5, z: -60 },
  { text: 'KEDAI', mat: MAT.neon_g, x: 20, y: 5.0, z: -20 },
  { text: 'OPEN', mat: MAT.neon_b, x: -22, y: 3.5, z: 20 },
  { text: '24', mat: MAT.neon_y, x: 22, y: 4.0, z: 60 },
  { text: 'MAKAN', mat: MAT.neon_r, x: -20, y: 3.8, z: 40 },
];

neonSigns.forEach(s => {
  const sign = box(2.5, 0.6, 0.1, s.mat, s.x, s.y, s.z);
  const glow = new THREE.PointLight(s.mat.emissive, 0.4, 8, 2);
  glow.position.set(s.x, s.y, s.z);
  scene.add(glow);
  lampLights.push({ light: glow, lamp: sign, base: 0.4, phase: Math.random() * Math.PI * 2, neon: true });
});

// ---- DISTANT SKYLINE (LOD far objects) ----
advanceLoad(55, 'membina skyline...');
// Low-poly distant buildings to suggest KL skyline
const distantBuildingData = [
  { x: -80, h: 60, w: 8, d: 8, z: -120 },
  { x: -65, h: 45, w: 6, d: 7, z: -110 },
  { x: -90, h: 80, w: 10, d: 10, z: -130 }, // Petronas-ish
  { x: -82, h: 80, w: 10, d: 10, z: -115 }, // Twin
  { x: 80, h: 55, w: 7, d: 8, z: -100 },
  { x: 70, h: 35, w: 6, d: 6, z: -90 },
  { x: 100, h: 70, w: 9, d: 9, z: -140 },
  { x: -100, h: 50, w: 8, d: 8, z: -80 },
];
const distMat = new THREE.MeshLambertMaterial({ color: 0x0d0d12 });
distantBuildingData.forEach(b => {
  box(b.w, b.h, b.d, distMat, b.x, b.h * 0.5, b.z);
  // Sparse window lights on far buildings
  if (Math.random() > 0.5) {
    const wl = new THREE.PointLight(0x4466aa, 0.15, 30, 2);
    wl.position.set(b.x, b.h * 0.7, b.z);
    scene.add(wl);
  }
});

// Twin towers spires (two boxes on top)
box(2, 20, 2, distMat, -90, 90, -130);
box(2, 20, 2, distMat, -82, 90, -115);

// ---- AMBIENT SCENE LIGHTS ----
scene.add(new THREE.AmbientLight(0x05050a, 0.8));
const moonLight = new THREE.DirectionalLight(0x334466, 0.3);
moonLight.position.set(50, 80, -50);
moonLight.castShadow = true;
scene.add(moonLight);

// ============================================================
// REAL CLOUDS — volumetric-style with layered sprites
// ============================================================
advanceLoad(60, 'mengumpul awan...');

const cloudGroup = new THREE.Group();
scene.add(cloudGroup);

function makeCloud(x, y, z, scale) {
  const g = new THREE.Group();
  const numPuffs = 5 + Math.floor(Math.random() * 5);
  const puffMat = new THREE.MeshStandardMaterial({
    color: 0x0c0c12,
    transparent: true,
    opacity: 0.55,
    roughness: 1,
    metalness: 0,
  });
  for (let i = 0; i < numPuffs; i++) {
    const r = (0.5 + Math.random() * 0.8) * scale;
    const puff = new THREE.Mesh(new THREE.SphereGeometry(r, 7, 5), puffMat.clone());
    puff.position.set(
      (Math.random() - 0.5) * scale * 2.5,
      (Math.random() - 0.5) * scale * 0.6,
      (Math.random() - 0.5) * scale * 1.5
    );
    g.add(puff);
  }
  g.position.set(x, y, z);
  cloudGroup.add(g);
  return g;
}

const clouds = [];
for (let i = 0; i < 18; i++) {
  const c = makeCloud(
    (Math.random() - 0.5) * 300,
    35 + Math.random() * 30,
    (Math.random() - 0.5) * 300,
    4 + Math.random() * 8
  );
  clouds.push({ mesh: c, speed: 0.3 + Math.random() * 0.5 });
}

// ============================================================
// AVATAR — Malay guy (low poly humanoid)
// ============================================================
advanceLoad(70, 'mencipta watak...');

const avatarGroup = new THREE.Group();
scene.add(avatarGroup);

const skinMat = new THREE.MeshLambertMaterial({ color: 0xb07850 });
const shirtMat = new THREE.MeshLambertMaterial({ color: 0x1a2a3a }); // dark baju
const pantsMat = new THREE.MeshLambertMaterial({ color: 0x22201e });
const hairMat = new THREE.MeshLambertMaterial({ color: 0x0a0806 });
const shoesMat = new THREE.MeshLambertMaterial({ color: 0x111111 });

function avBox(w, h, d, mat, x, y, z) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  m.castShadow = true;
  avatarGroup.add(m);
  return m;
}

// Body
avBox(0.42, 0.55, 0.22, shirtMat, 0, 1.05, 0);   // torso
avBox(0.38, 0.55, 0.20, pantsMat, 0, 0.45, 0);    // lower body
// Head
avBox(0.3, 0.32, 0.28, skinMat, 0, 1.58, 0);       // head
avBox(0.32, 0.1, 0.30, hairMat, 0, 1.74, -0.01);   // hair top
avBox(0.31, 0.18, 0.08, hairMat, 0, 1.66, -0.14);  // hair back
// Arms
const armL = avBox(0.13, 0.48, 0.13, shirtMat, -0.28, 1.02, 0);
const armR = avBox(0.13, 0.48, 0.13, shirtMat, 0.28, 1.02, 0);
avBox(0.11, 0.22, 0.11, skinMat, -0.28, 0.72, 0);   // forearm L
avBox(0.11, 0.22, 0.11, skinMat, 0.28, 0.72, 0);    // forearm R
avBox(0.10, 0.12, 0.09, skinMat, -0.28, 0.56, 0);   // hand L
avBox(0.10, 0.12, 0.09, skinMat, 0.28, 0.56, 0);    // hand R
// Legs
const legL = avBox(0.16, 0.48, 0.16, pantsMat, -0.11, 0.12, 0);
const legR = avBox(0.16, 0.48, 0.16, pantsMat, 0.11, 0.12, 0);
avBox(0.14, 0.18, 0.22, shoesMat, -0.11, -0.15, 0.03); // shoe L
avBox(0.14, 0.18, 0.22, shoesMat, 0.11, -0.15, 0.03);  // shoe R

avatarGroup.position.set(0, 0, -3);
avatarGroup.visible = true;

// ============================================================
// NENEK KEBAYAN — horror entity
// ============================================================
advanceLoad(80, 'memanggil entiti...');

const nenekGroup = new THREE.Group();
scene.add(nenekGroup);
nenekGroup.visible = false;

const oldSkinMat = new THREE.MeshLambertMaterial({ color: 0x6a5545 });
const bajuMat = new THREE.MeshLambertMaterial({ color: 0x181010 });
const whiteHairMat = new THREE.MeshLambertMaterial({ color: 0xccccbb });

function nenekBox(w, h, d, mat, x, y, z) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  m.castShadow = true;
  nenekGroup.add(m);
  return m;
}

// Hunched body — smaller, stooped
nenekBox(0.38, 0.45, 0.20, bajuMat, 0, 0.82, 0);    // torso (hunched)
nenekBox(0.34, 0.45, 0.18, bajuMat, 0, 0.32, 0);    // lower
nenekBox(0.26, 0.28, 0.24, oldSkinMat, 0, 1.26, 0.04); // head (forward tilt)
nenekBox(0.28, 0.18, 0.26, whiteHairMat, 0, 1.40, -0.02); // hair
// Long dragging arms
nenekBox(0.10, 0.60, 0.10, bajuMat, -0.26, 0.70, 0.05);
nenekBox(0.10, 0.60, 0.10, bajuMat, 0.26, 0.70, 0.05);
nenekBox(0.09, 0.20, 0.08, oldSkinMat, -0.26, 0.35, 0.05); // hand claw
nenekBox(0.09, 0.20, 0.08, oldSkinMat, 0.26, 0.35, 0.05);
// Legs
nenekBox(0.14, 0.44, 0.14, bajuMat, -0.10, 0.08, 0);
nenekBox(0.14, 0.44, 0.14, bajuMat, 0.10, 0.08, 0);

nenekGroup.rotation.x = 0.15; // slouch forward
nenekGroup.position.set(999, 0, 999); // far away initially

// ============================================================
// INPUT SYSTEM
// ============================================================
const keys = {
  forward: false, back: false, left: false, right: false, sprint: false
};

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.forward = true;
  if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.back = true;
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
  if (e.key === 'Shift') keys.sprint = true;
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.forward = false;
  if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.back = false;
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
  if (e.key === 'Shift') keys.sprint = false;
});

// D-pad touch
document.querySelectorAll('#dpad button[data-dir]').forEach(btn => {
  const dir = btn.dataset.dir;
  const start = (e) => { e.preventDefault(); keys[dir] = true; btn.classList.add('pressed'); };
  const end = (e) => { e.preventDefault(); keys[dir] = false; btn.classList.remove('pressed'); };
  btn.addEventListener('touchstart', start, { passive: false });
  btn.addEventListener('touchend', end, { passive: false });
  btn.addEventListener('touchcancel', end, { passive: false });
  btn.addEventListener('mousedown', start);
  btn.addEventListener('mouseup', end);
});

// Mouse look
let yaw = 0, pitch = 0;
let isPointerLocked = false;
canvas.addEventListener('click', () => { canvas.requestPointerLock(); });
document.addEventListener('pointerlockchange', () => {
  isPointerLocked = document.pointerLockElement === canvas;
});
document.addEventListener('mousemove', e => {
  if (!isPointerLocked) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-0.6, Math.min(0.6, pitch));
});

// Touch look (swipe right half of screen)
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  if (t.clientX > window.innerWidth * 0.4) {
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  const t = e.touches[0];
  if (t.clientX > window.innerWidth * 0.4) {
    yaw -= (t.clientX - touchStartX) * 0.003;
    pitch -= (t.clientY - touchStartY) * 0.003;
    pitch = Math.max(-0.5, Math.min(0.5, pitch));
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }
}, { passive: true });

// ============================================================
// PLAYER MOVEMENT
// ============================================================
const playerPos = new THREE.Vector3(0, 1.7, 0);
const velocity = new THREE.Vector3();
const WALK_SPEED = 4.0;
const RUN_SPEED = 8.5;

function updatePlayer(dt) {
  const speed = keys.sprint ? RUN_SPEED : WALK_SPEED;
  const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
  const move = new THREE.Vector3();

  if (keys.forward) move.add(forward);
  if (keys.back) move.sub(forward);
  if (keys.right) move.add(right);
  if (keys.left) move.sub(right);

  if (move.length() > 0) {
    move.normalize().multiplyScalar(speed * dt);
    playerPos.add(move);
  }

  // Clamp to world bounds
  playerPos.x = Math.max(-90, Math.min(90, playerPos.x));
  playerPos.z = Math.max(-140, Math.min(60, playerPos.z));
  playerPos.y = 1.7;

  // Camera
  camera.position.copy(playerPos);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // Avatar follows player, slightly ahead in walk direction
  const behindOffset = new THREE.Vector3(Math.sin(yaw) * 1.2, -1.7, Math.cos(yaw) * 1.2);
  avatarGroup.position.copy(playerPos).add(behindOffset);
  avatarGroup.rotation.y = yaw + Math.PI;

  // Walk animation (bob limbs)
  const isMoving = keys.forward || keys.back || keys.left || keys.right;
  if (isMoving) {
    const t = clock.getElapsedTime() * (keys.sprint ? 6 : 3.5);
    legL.position.y = 0.12 + Math.sin(t) * 0.08;
    legR.position.y = 0.12 - Math.sin(t) * 0.08;
    armL.position.y = 1.02 - Math.sin(t) * 0.06;
    armR.position.y = 1.02 + Math.sin(t) * 0.06;
    // Slight body bob
    avatarGroup.position.y += Math.sin(t * 2) * 0.02;
  }
}

// ============================================================
// HORROR SYSTEM
// ============================================================
const horrorOverlay = document.getElementById('horror-overlay');
const nenekText = document.getElementById('nenek-text');
const stillFrame = document.getElementById('still-frame');
const stillCanvas = document.getElementById('still-canvas');
const stillCtx = stillCanvas.getContext('2d');
const stillText = document.getElementById('still-frame-text');

let horrorState = {
  lastEvent: 0,
  nextEventDelay: 20 + Math.random() * 30, // first event 20-50s in
  nenekActive: false,
  nenekPhase: 'idle',
  nenekTarget: new THREE.Vector3(),
  nenekTimer: 0,
  stillFrameActive: false,
  stillFrameTimer: 0,
  ambientFlicker: 0,
};

const horrorMessages = [
  'AWAK TAHU DIA ADA DI BELAKANG AWAK',
  'JANGAN TOLEH',
  'DIA NAMPAK AWAK',
  'TINGGALKAN LORONG INI',
  '...',
  'NENEK KEBAYAN',
  'PULANG',
  'JANGAN LARI',
];

function drawStillFrame(type) {
  const w = stillCanvas.width, h = stillCanvas.height;
  stillCtx.fillStyle = '#000';
  stillCtx.fillRect(0, 0, w, h);

  if (type === 'alley') {
    // Procedural dark alley still frame
    // Sky gradient
    const skyGrad = stillCtx.createLinearGradient(0, 0, 0, h * 0.6);
    skyGrad.addColorStop(0, '#06060a');
    skyGrad.addColorStop(1, '#0c0c14');
    stillCtx.fillStyle = skyGrad;
    stillCtx.fillRect(0, 0, w, h * 0.6);

    // Alley walls
    stillCtx.fillStyle = '#0a0a0c';
    stillCtx.fillRect(0, h * 0.1, w * 0.25, h);
    stillCtx.fillRect(w * 0.75, h * 0.1, w * 0.25, h);
    // Ground
    stillCtx.fillStyle = '#080809';
    stillCtx.fillRect(w * 0.25, h * 0.55, w * 0.5, h);

    // Perspective lines (vanishing point)
    stillCtx.strokeStyle = '#111116';
    stillCtx.lineWidth = 1;
    stillCtx.beginPath();
    stillCtx.moveTo(w * 0.25, h * 0.55); stillCtx.lineTo(w * 0.45, h * 0.35);
    stillCtx.moveTo(w * 0.75, h * 0.55); stillCtx.lineTo(w * 0.55, h * 0.35);
    stillCtx.stroke();

    // Lamp glow at end of alley
    const glowGrad = stillCtx.createRadialGradient(w * 0.5, h * 0.3, 2, w * 0.5, h * 0.3, 60);
    glowGrad.addColorStop(0, 'rgba(255,230,150,0.15)');
    glowGrad.addColorStop(1, 'transparent');
    stillCtx.fillStyle = glowGrad;
    stillCtx.fillRect(0, 0, w, h);

    // Dark figure silhouette at end of alley
    stillCtx.fillStyle = '#000000';
    stillCtx.fillRect(w * 0.47, h * 0.32, 6, 18);  // body
    stillCtx.beginPath();
    stillCtx.arc(w * 0.5, h * 0.30, 5, 0, Math.PI * 2);
    stillCtx.fill();

    // Grain noise
    for (let i = 0; i < 2000; i++) {
      const nx = Math.random() * w, ny = Math.random() * h;
      const a = Math.random() * 0.06;
      stillCtx.fillStyle = `rgba(255,255,255,${a})`;
      stillCtx.fillRect(nx, ny, 1, 1);
    }

    // Horizontal scan lines
    stillCtx.fillStyle = 'rgba(0,0,0,0.3)';
    for (let y = 0; y < h; y += 3) {
      stillCtx.fillRect(0, y, w, 1);
    }

  } else if (type === 'nenek') {
    stillCtx.fillStyle = '#000';
    stillCtx.fillRect(0, 0, w, h);

    // Dark street scene
    stillCtx.fillStyle = '#0a0a0e';
    stillCtx.fillRect(0, h * 0.45, w, h);
    stillCtx.fillStyle = '#050507';
    stillCtx.fillRect(0, 0, w * 0.2, h);
    stillCtx.fillRect(w * 0.8, 0, w * 0.2, h);

    // Nenek silhouette — hunched, centre frame
    stillCtx.fillStyle = '#000000';
    // Body (hunched)
    stillCtx.beginPath();
    stillCtx.ellipse(w * 0.5, h * 0.52, 18, 25, -0.3, 0, Math.PI * 2);
    stillCtx.fill();
    // Head (forward tilt)
    stillCtx.beginPath();
    stillCtx.arc(w * 0.5 - 8, h * 0.40, 12, 0, Math.PI * 2);
    stillCtx.fill();
    // White hair wisps
    stillCtx.strokeStyle = 'rgba(200,200,190,0.4)';
    stillCtx.lineWidth = 1;
    for (let i = 0; i < 8; i++) {
      stillCtx.beginPath();
      stillCtx.moveTo(w * 0.5 - 8 + (Math.random()-0.5)*20, h * 0.35);
      stillCtx.lineTo(w * 0.5 - 8 + (Math.random()-0.5)*30, h * 0.28);
      stillCtx.stroke();
    }
    // Long arm reaching toward viewer
    stillCtx.fillStyle = '#0a0806';
    stillCtx.beginPath();
    stillCtx.moveTo(w * 0.5 + 15, h * 0.5);
    stillCtx.lineTo(w * 0.5 + 60, h * 0.62);
    stillCtx.lineTo(w * 0.5 + 55, h * 0.65);
    stillCtx.lineTo(w * 0.5 + 8, h * 0.54);
    stillCtx.fill();

    // Eyes — just two faint points of light
    const eyeGlow = stillCtx.createRadialGradient(w*0.5-12, h*0.40, 0, w*0.5-12, h*0.40, 5);
    eyeGlow.addColorStop(0, 'rgba(255,200,100,0.7)');
    eyeGlow.addColorStop(1, 'transparent');
    stillCtx.fillStyle = eyeGlow;
    stillCtx.fillRect(w*0.5-17, h*0.37, 10, 10);

    const eyeGlow2 = stillCtx.createRadialGradient(w*0.5-4, h*0.40, 0, w*0.5-4, h*0.40, 5);
    eyeGlow2.addColorStop(0, 'rgba(255,200,100,0.7)');
    eyeGlow2.addColorStop(1, 'transparent');
    stillCtx.fillStyle = eyeGlow2;
    stillCtx.fillRect(w*0.5-9, h*0.37, 10, 10);

    // Vignette
    const vig = stillCtx.createRadialGradient(w*0.5, h*0.5, w*0.1, w*0.5, h*0.5, w*0.7);
    vig.addColorStop(0, 'transparent');
    vig.addColorStop(1, 'rgba(0,0,0,0.85)');
    stillCtx.fillStyle = vig;
    stillCtx.fillRect(0, 0, w, h);

    // Film grain
    for (let i = 0; i < 3000; i++) {
      stillCtx.fillStyle = `rgba(255,255,255,${Math.random() * 0.04})`;
      stillCtx.fillRect(Math.random()*w, Math.random()*h, 1, 1);
    }
    // Scan lines
    stillCtx.fillStyle = 'rgba(0,0,0,0.25)';
    for (let y = 0; y < h; y += 3) stillCtx.fillRect(0, y, w, 1);
  }
}

function triggerStillFrame(type, msg, duration) {
  horrorState.stillFrameActive = true;
  drawStillFrame(type);
  stillText.textContent = msg || '';
  stillFrame.classList.add('active');
  horrorState.stillFrameTimer = duration || 2.5;
}

function triggerNenekAppearance() {
  // Place nenek far down the alley from player
  const angleAhead = yaw + Math.PI + (Math.random() - 0.5) * 0.5;
  const dist = 15 + Math.random() * 10;
  nenekGroup.position.set(
    playerPos.x + Math.sin(angleAhead) * dist,
    0,
    playerPos.z + Math.cos(angleAhead) * dist
  );
  nenekGroup.rotation.y = yaw + Math.PI; // face player
  nenekGroup.visible = true;
  horrorState.nenekActive = true;
  horrorState.nenekPhase = 'still';
  horrorState.nenekTimer = 1.5 + Math.random() * 2;

  nenekText.textContent = 'NENEK KEBAYAN';
  nenekText.classList.add('visible');
  setTimeout(() => nenekText.classList.remove('visible'), 2500);
}

function updateHorror(dt, elapsed) {
  // Schedule random events
  if (elapsed - horrorState.lastEvent > horrorState.nextEventDelay) {
    horrorState.lastEvent = elapsed;
    horrorState.nextEventDelay = 15 + Math.random() * 35;

    const roll = Math.random();
    if (roll < 0.35) {
      // Lamp flicker event
      horrorState.ambientFlicker = 3 + Math.random() * 4;
    } else if (roll < 0.6) {
      // Still frame — alley
      triggerStillFrame('alley', horrorMessages[Math.floor(Math.random() * horrorMessages.length)], 2 + Math.random());
    } else if (roll < 0.85) {
      // Nenek appears
      triggerNenekAppearance();
    } else {
      // Nenek still frame
      triggerStillFrame('nenek', 'DIA NAMPAK AWAK', 3);
    }
  }

  // Lamp flicker
  if (horrorState.ambientFlicker > 0) {
    horrorState.ambientFlicker -= dt;
    lampLights.forEach(l => {
      if (Math.random() > 0.5) {
        l.light.intensity = Math.random() * l.base;
        if (l.lamp && l.lamp.material) {
          l.lamp.material.emissiveIntensity = Math.random() * 0.6;
        }
      }
    });
    if (Math.random() > 0.7) {
      horrorOverlay.classList.add('flash');
      setTimeout(() => horrorOverlay.classList.remove('flash'), 80);
    }
  } else {
    // Normal flicker (subtle, always on)
    const t = clock.getElapsedTime();
    lampLights.forEach(l => {
      const flicker = 0.92 + 0.08 * Math.sin(t * (l.phase + 2));
      l.light.intensity = l.base * flicker;
    });
  }

  // Still frame timer
  if (horrorState.stillFrameActive) {
    horrorState.stillFrameTimer -= dt;
    if (horrorState.stillFrameTimer <= 0) {
      horrorState.stillFrameActive = false;
      stillFrame.classList.remove('active');
    }
  }

  // Nenek movement logic
  if (horrorState.nenekActive) {
    horrorState.nenekTimer -= dt;
    const toPlayer = new THREE.Vector3().subVectors(playerPos, nenekGroup.position);
    const dist = toPlayer.length();

    if (horrorState.nenekPhase === 'still') {
      // Stands still, watching
      if (horrorState.nenekTimer <= 0) {
        horrorState.nenekPhase = 'walking';
        horrorState.nenekTimer = 3 + Math.random() * 3;
      }
    } else if (horrorState.nenekPhase === 'walking') {
      // Slow shuffle toward player
      if (dist > 2) {
        toPlayer.normalize();
        nenekGroup.position.addScaledVector(toPlayer, 1.2 * dt);
        nenekGroup.rotation.y = Math.atan2(toPlayer.x, toPlayer.z);
        // Shuffle animation
        nenekGroup.position.y = Math.abs(Math.sin(clock.getElapsedTime() * 3)) * 0.03;
      }
      if (dist < 2.5 || horrorState.nenekTimer <= 0) {
        // Vanish
        nenekGroup.visible = false;
        horrorState.nenekActive = false;
        horrorState.nenekPhase = 'idle';
        horrorOverlay.classList.add('red-flash');
        setTimeout(() => horrorOverlay.classList.remove('red-flash'), 400);
      }
    }

    // If player looks directly at nenek, it freezes
    const toCam = new THREE.Vector3().subVectors(nenekGroup.position, camera.position).normalize();
    const camDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    const dot = toCam.dot(camDir);
    if (dot > 0.97 && dist < 20) {
      horrorState.nenekPhase = 'still';
      horrorState.nenekTimer = 1.5;
    }
  }
}

// ============================================================
// AMBIENT AUDIO (Web Audio API)
// ============================================================
let audioCtx = null;
let audioStarted = false;

function initAudio() {
  if (audioStarted) return;
  audioStarted = true;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const master = audioCtx.createGain();
    master.gain.value = 0.25;
    master.connect(audioCtx.destination);

    // Low drone — ambient tension
    function createDrone(freq, gain, detune) {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      if (detune) osc.detune.value = detune;
      g.gain.value = gain;
      // Low-pass filter to make it muffled
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 200 + Math.random() * 100;
      osc.connect(filter);
      filter.connect(g);
      g.connect(master);
      osc.start();
      // Slowly modulate
      const lfo = audioCtx.createOscillator();
      const lfoGain = audioCtx.createGain();
      lfo.frequency.value = 0.05 + Math.random() * 0.08;
      lfoGain.gain.value = 8;
      lfo.connect(lfoGain);
      lfoGain.connect(osc.detune);
      lfo.start();
      return osc;
    }
    createDrone(55, 0.12, 0);
    createDrone(55.3, 0.06, 5);
    createDrone(27.5, 0.08, -3);

    // Distant wind
    function createWind() {
      const bufferSize = audioCtx.sampleRate * 2;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1);
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.loop = true;
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 400;
      filter.Q.value = 0.5;
      const windGain = audioCtx.createGain();
      windGain.gain.value = 0.03;
      source.connect(filter);
      filter.connect(windGain);
      windGain.connect(master);
      source.start();
    }
    createWind();

    // Random distant footstep / creak scheduler
    function scheduleCreak() {
      const delay = 8 + Math.random() * 20;
      setTimeout(() => {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(180 + Math.random() * 80, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.3);
        g.gain.setValueAtTime(0.08, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
        osc.connect(g);
        g.connect(master);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
        scheduleCreak();
      }, delay * 1000);
    }
    scheduleCreak();

  } catch(e) {
    console.warn('Audio init failed:', e);
  }
}

// Start audio on first user interaction
document.addEventListener('keydown', initAudio, { once: true });
document.addEventListener('touchstart', initAudio, { once: true });
document.addEventListener('click', initAudio, { once: true });

// ============================================================
// HUD UPDATES
// ============================================================
const timeDisplay = document.getElementById('time-display');
const coordsDisplay = document.getElementById('coords');
let gameMinutes = 3 * 60 + 17; // start at 3:17 AM
let lastHUDUpdate = 0;

function updateHUD(elapsed) {
  if (elapsed - lastHUDUpdate < 1) return;
  lastHUDUpdate = elapsed;
  gameMinutes = (gameMinutes + 1) % (24 * 60);
  const h = Math.floor(gameMinutes / 60).toString().padStart(2, '0');
  const m = (gameMinutes % 60).toString().padStart(2, '0');
  const suffix = gameMinutes < 12 * 60 ? 'AM' : 'PM';
  const displayH = gameMinutes % (12 * 60) === 0 ? 12 : Math.floor((gameMinutes % (12 * 60)) / 60);
  timeDisplay.textContent = `${displayH.toString().padStart(2,'0')}:${m} ${suffix}`;

  // Fake GPS drift
  const lat = (3.1390 + playerPos.z * 0.00002).toFixed(4);
  const lon = (101.6869 + playerPos.x * 0.00002).toFixed(4);
  coordsDisplay.textContent = `${lat}° N, ${lon}° E`;
}

// ============================================================
// CLOUD ANIMATION
// ============================================================
function updateClouds(dt) {
  clouds.forEach(c => {
    c.mesh.position.x += c.speed * dt;
    if (c.mesh.position.x > 160) c.mesh.position.x = -160;
  });
}

// ============================================================
// CONTROLS HINT FADE
// ============================================================
const controlsHint = document.getElementById('controls-hint');
let hintTimer = 5;
let hintFaded = false;

// ============================================================
// MAIN LOOP
// ============================================================
advanceLoad(90, 'hampir siap...');

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const elapsed = clock.getElapsedTime();

  updatePlayer(dt);
  updateClouds(dt);
  updateHorror(dt, elapsed);
  updateHUD(elapsed);

  // Fade controls hint
  if (!hintFaded) {
    hintTimer -= dt;
    if (hintTimer <= 0) {
      controlsHint.style.opacity = '0';
      hintFaded = true;
    }
  }

  renderer.render(scene, camera);
}

// ============================================================
// WINDOW RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// LAUNCH
// ============================================================
advanceLoad(100, 'selamat datang ke kawasan');

setTimeout(() => {
  const loadEl = document.getElementById('loading');
  loadEl.style.opacity = '0';
  setTimeout(() => { loadEl.style.display = 'none'; }, 1000);
  animate();
}, 1200);

})();
